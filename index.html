<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר כלי AI לחינוך</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0efe9;
  --surface: #ffffff;
  --surface2: #f5f4f0;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #18181a;
  --text2: #5a5a58;
  --text3: #9a9a96;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --blue-text: #0C447C;
  --teal: #0F6E56; --teal-bg: #E1F5EE; --teal-text: #085041;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #633806;
  --coral: #993C1D; --coral-bg: #FAECE7; --coral-text: #4A1B0C;
  --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #26215C;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #173404;
  --pink: #993556; --pink-bg: #FBEAF0; --pink-text: #4B1528;
  --rad: 10px; --rad-lg: 14px; --rad-xl: 18px;
  --fs-base: 15px;
  --fs-sm: 13px;
  --fs-xs: 11px;
  --fs-card-name: 14px;
  --fs-card-short: 12px;
}
/* dark mode */
[data-theme="dark"] {
  --bg: #141414;
  --surface: #1e1e1e;
  --surface2: #252525;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8e8e4;
  --text2: #a0a09c;
  --text3: #606060;
  --blue-bg: #0d2d4a;
  --blue-text: #6db3f2;
  --teal-bg: #0a2820; --teal-text: #5ccba4;
  --amber-bg: #2a1e08; --amber-text: #f0b955;
  --coral-bg: #2a1208; --coral-text: #f0845a;
  --purple-bg: #1e1840; --purple-text: #a89af0;
  --green-bg: #0e2210; --green-text: #7dcc7d;
  --pink-bg: #2a0e1a; --pink-text: #f090b8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Assistant',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:var(--fs-base)}
body.ltr{font-family:'Inter',Arial,sans-serif;direction:ltr}
body.rtl{direction:rtl}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:12px;cursor:pointer}
.topbar-left:hover .app-name{color:var(--blue)}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;user-select:none}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.app-name{font-size:15px;font-weight:600;color:var(--text);transition:color .15s}
.app-name span{font-weight:300;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:5px}
.lang-btn{padding:5px 10px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);font-weight:500}
.ctrl-btn{width:32px;height:32px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;font-family:inherit;flex-shrink:0}
.ctrl-btn:hover{background:var(--surface2);color:var(--text)}
.ctrl-sep{width:0.5px;height:20px;background:var(--border2);margin:0 2px}

/* ── LAYOUT ── */
.main{display:flex;flex:1}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-inline-end:0.5px solid var(--border);padding:20px 12px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.content{flex:1;padding:24px;min-width:0;overflow-y:auto}

/* ── SIDEBAR ── */
.sidebar-section{margin-bottom:24px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--rad);cursor:pointer;transition:background .1s}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--blue-bg)}
.nav-item-label{font-size:var(--fs-sm);color:var(--text)}
.nav-item.active .nav-item-label{color:var(--blue-text);font-weight:500}
.nav-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:99px}
.nav-item.active .nav-count{background:rgba(24,95,165,.12);color:var(--blue-text)}

/* ── SEARCH ── */
.search-wrap{background:var(--surface);border-radius:var(--rad-lg);border:0.5px solid var(--border);padding:16px 20px;margin-bottom:16px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;height:42px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue);background:white}
.search-btn{height:42px;padding:0 20px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;overflow:hidden;max-height:36px;transition:max-height .3s ease}
.chips-row.expanded{max-height:300px}
.chip{padding:4px 12px;border-radius:99px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.chip.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);font-weight:500}
.chip:hover{background:var(--surface);border-color:var(--border2)}
.tags-expand-btn{padding:4px 10px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tags-expand-btn:hover{background:var(--surface2);color:var(--text2)}

/* ── CARDS ── */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-size:13px;color:var(--text2)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--surface);border-radius:var(--rad-lg);border:0.5px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--border2)}
.card.featured{border-color:var(--blue);border-width:1.5px}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-icon{width:40px;height:40px;border-radius:var(--rad);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.card-icon img{width:28px;height:28px;object-fit:contain}
.card-name{font-size:var(--fs-card-name);font-weight:600;color:var(--text);line-height:1.3}
.card-short{font-size:var(--fs-card-short);color:var(--text2);margin-top:2px;line-height:1.4}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.t-cat{background:var(--blue-bg);color:var(--blue-text)}
.t-subj{background:var(--green-bg);color:var(--green-text)}
.t-free{background:var(--teal-bg);color:var(--teal-text)}
.t-partial{background:var(--amber-bg);color:var(--amber-text)}
.t-paid{background:var(--coral-bg);color:var(--coral-text)}
.t-he{background:var(--purple-bg);color:var(--purple-text)}
.t-use{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2)}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--border);margin-top:auto}
.meta-badge{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.video-dot{width:8px;height:8px;background:var(--pink);border-radius:99px;display:inline-block}
.card-btns{display:flex;gap:6px}
.btn-xs{font-size:12px;padding:4px 10px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .1s}
.btn-xs:hover{background:var(--surface2)}
.btn-xs.primary{background:var(--blue);color:white;border-color:var(--blue);font-weight:500}
.btn-xs.primary:hover{background:var(--blue-text)}
.featured-badge{font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:2px 8px;border-radius:99px;font-weight:600}
/* collapsible tech */
.tech-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;user-select:none;border:none;background:transparent;font-family:inherit;margin-bottom:4px}
.tech-toggle:hover{color:var(--text2)}
.tech-toggle-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.tech-toggle-arrow.open{transform:rotate(90deg)}
.tech-bar{display:flex;flex-wrap:wrap;gap:6px;overflow:hidden;max-height:0;transition:max-height .25s ease,opacity .2s;opacity:0}
.tech-bar.open{max-height:200px;opacity:1}
.tech-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surface2);border:0.5px solid var(--border)}
.tech-pill .pill-label{color:var(--text3);font-size:11px}
.tech-pill .pill-val{font-weight:500;color:var(--text)}

/* ── DETAIL ── */
.detail-page{max-width:720px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:20px;padding:6px 0}
.back-btn:hover{color:var(--text)}
.detail-card{background:var(--surface);border-radius:var(--rad-xl);border:0.5px solid var(--border);padding:28px;margin-bottom:16px}
.detail-header{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
.detail-icon{width:52px;height:52px;border-radius:var(--rad-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:var(--surface2)}
.detail-icon img{width:100%;height:100%;object-fit:contain;padding:6px}
.detail-title{font-size:22px;font-weight:700;color:var(--text)}
.detail-subtitle{font-size:var(--fs-sm);color:var(--text2);margin-top:4px}
.detail-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-action{padding:8px 18px;border-radius:var(--rad);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border2);background:transparent;color:var(--text);transition:all .15s}
.btn-action.primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn-action.primary:hover{background:var(--blue-text)}
.btn-action:hover{background:var(--surface2)}
.detail-desc{font-size:var(--fs-sm);color:var(--text);line-height:1.8;margin-bottom:20px}
.detail-sec-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.tech-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tech-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surface2);border:0.5px solid var(--border)}
.tech-pill .pill-label{color:var(--text3);font-size:11px}
.tech-pill .pill-val{font-weight:500;color:var(--text)}
.edu-box{background:var(--blue-bg);border-radius:var(--rad-lg);padding:14px 16px;margin-bottom:10px}
.edu-box-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.edu-box-title{font-size:13px;font-weight:600;color:var(--blue-text)}
.edu-box-text{font-size:var(--fs-sm);color:var(--blue-text);line-height:1.65;opacity:.9}
.tip-box{background:var(--teal-bg);border-radius:var(--rad);padding:11px 14px;margin-bottom:20px;border-inline-start:3px solid var(--teal)}
body.rtl .tip-box{border-inline-start:none;border-inline-end:3px solid var(--teal)}
.tip-label{font-size:11px;font-weight:600;color:var(--teal);margin-bottom:3px}
.tip-text{font-size:var(--fs-sm);color:var(--teal-text);line-height:1.6}
.tags-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.related-section{background:var(--surface);border-radius:var(--rad-xl);border:0.5px solid var(--border);padding:20px}
.related-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.related-card{border:0.5px solid var(--border);border-radius:var(--rad);padding:10px 12px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:10px}
.related-card:hover{border-color:var(--blue)}
.related-favicon{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;font-size:14px}
.related-favicon img{width:100%;height:100%;object-fit:contain;padding:3px}
.related-name{font-size:var(--fs-card-short);font-weight:600;color:var(--text)}
.related-cat{font-size:11px;color:var(--text3);margin-top:1px}

/* ── ADMIN PANEL ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.admin-modal{background:var(--surface);border-radius:var(--rad-xl);width:min(700px,95vw);max-height:90vh;overflow-y:auto;border:0.5px solid var(--border)}
.admin-header{padding:20px 24px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10}
.admin-header-title{font-size:16px;font-weight:600;color:var(--text)}
.admin-close{width:32px;height:32px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.admin-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);padding:0 24px}
.admin-tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-family:inherit;background:transparent;border-top:none;border-left:none;border-right:none;transition:all .15s}
.admin-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.admin-body{padding:24px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 12px;font-size:14px;font-family:inherit;outline:none}
.form-input{height:40px}
.form-select{height:40px;cursor:pointer}
.form-textarea{height:80px;padding:10px 12px;resize:vertical}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:white}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-submit{width:100%;height:44px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.form-submit:hover{background:var(--blue-text)}
.form-submit:disabled{background:var(--text3);cursor:not-allowed}

/* AI fill */
.ai-fill-row{display:flex;gap:8px;margin-bottom:16px}
.ai-fill-input{flex:1;height:42px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 14px;font-size:14px;font-family:inherit;outline:none}
.ai-fill-input:focus{border-color:var(--blue);background:white}
.ai-fill-btn{height:42px;padding:0 16px;background:var(--purple);color:white;border:none;border-radius:var(--rad);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.ai-fill-btn:disabled{background:var(--text3);cursor:not-allowed}
.ai-status{font-size:12px;color:var(--text3);margin-bottom:12px;min-height:18px}
.ai-status.loading{color:var(--purple)}
.ai-status.done{color:var(--teal)}
.ai-status.error{color:var(--coral)}
.divider{height:0.5px;background:var(--border);margin:16px 0}

/* tools list in admin */
.tool-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--rad);border:0.5px solid var(--border);margin-bottom:8px;background:var(--surface2)}
.tool-row-icon{font-size:20px;flex-shrink:0}
.tool-row-info{flex:1;min-width:0}
.tool-row-name{font-size:13px;font-weight:600;color:var(--text)}
.tool-row-cat{font-size:11px;color:var(--text3)}
.tool-row-actions{display:flex;gap:6px;flex-shrink:0}
.btn-delete{padding:4px 10px;border-radius:var(--rad);border:0.5px solid rgba(153,60,29,.3);background:var(--coral-bg);color:var(--coral);font-size:12px;cursor:pointer;font-family:inherit}
.btn-feature{padding:4px 10px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit}
.btn-feature.on{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue)}

/* api key */
.apikey-wrap{background:var(--surface2);border-radius:var(--rad);border:0.5px solid var(--border);padding:16px;margin-bottom:16px}
.apikey-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.apikey-row{display:flex;gap:8px}
.apikey-input{flex:1;height:38px;border-radius:var(--rad);border:0.5px solid var(--border2);background:white;color:var(--text);padding:0 12px;font-size:13px;font-family:'Inter',monospace;outline:none}
.apikey-input:focus{border-color:var(--blue)}
.apikey-save{height:38px;padding:0 14px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:13px;cursor:pointer;font-family:inherit}
.apikey-status{font-size:11px;color:var(--teal);margin-top:5px}
.notice{font-size:12px;color:var(--text3);line-height:1.5;background:var(--amber-bg);color:var(--amber-text);border-radius:var(--rad);padding:10px 12px;margin-bottom:14px}

/* password */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center}
.pw-box{background:var(--surface);border-radius:var(--rad-xl);padding:28px;width:300px;text-align:center}
.pw-title{font-size:15px;font-weight:600;margin-bottom:12px}
.pw-input{width:100%;height:40px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 12px;font-size:15px;letter-spacing:.2em;font-family:monospace;outline:none;text-align:center;margin-bottom:10px}
.pw-input:focus{border-color:var(--blue)}
.pw-btn{width:100%;height:40px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;cursor:pointer;font-family:inherit}
.pw-err{font-size:12px;color:var(--coral);margin-top:6px}
.pw-cancel{font-size:12px;color:var(--text3);cursor:pointer;margin-top:8px;display:block}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:0.5px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:auto}
.footer-credit{font-size:12px;color:var(--text3)}
.footer-credit strong{color:var(--text2);font-weight:500}
.footer-copy{font-size:11px;color:var(--text3)}

/* ── RESPONSIVE — MOBILE ── */
@media (max-width: 768px) {
  .sidebar{display:none}
  .content{padding:14px}
  .topbar{padding:0 14px;height:52px}
  .app-name span{display:none}
  .app-name{font-size:14px}
  .lang-btn{padding:4px 9px;font-size:12px}

  .search-wrap{padding:12px 14px;border-radius:var(--rad)}
  .search-row{gap:6px}
  .search-input{height:38px;font-size:13px}
  .search-btn{height:38px;padding:0 14px;font-size:13px}
  .chips-row{gap:5px}
  .chip{font-size:11px;padding:3px 10px}

  .cards-grid{grid-template-columns:1fr;gap:10px}
  .card{padding:13px}

  .footer{padding:12px 14px}
  .footer-copy{display:none}
}

/* empty */
.empty-state{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-title{font-size:16px;font-weight:500;margin-bottom:4px}
.empty-sub{font-size:13px}

@media (max-width: 420px) {
  .cards-grid{grid-template-columns:1fr}

  {id:1,name:'PDF24 Tools',tags:['עבודה עם PDF','מיזוג מסמכים','פיצול PDF','הכנת חומר לתלמידים','המרת קבצים'],shortHe:'24 כלים חינמיים לעבודה עם PDF — מיזוג, פיצול, המרה, עריכה',shortEn:'24 free PDF tools — merge, split, convert, edit and compress',fullHe:'PDF24 הוא אוסף של 24 כלים מקוונים חינמיים לחלוטין לעבודה עם קבצי PDF. מיזוג קבצים, פיצול, דחיסה, עריכה, חתימה, המרת תמונות, הוספת סימני מים, OCR ועוד. אינו דורש התקנה ועובד ישירות בדפדפן.',fullEn:'PDF24 offers 24 fully free online PDF tools — merge, split, compress, edit, sign, convert images, add watermarks, OCR and more. No installation needed.',whyEduHe:'מורים מקבלים חומרים ממקורות שונים — קובץ מהמפקחת, דף מהספר, מסמך ממשרד החינוך. PDF24 מאפשר למזג, לחתוך ולהכין חבילת חומרים מסודרת לתלמידים בלי להתקין כלום.',whyEduEn:'Teachers receive materials from many sources. PDF24 lets you merge, crop, and package clean study materials for students — free, no installation needed.',tipHe:'גררו כמה קבצי PDF לכלי המיזוג, קבעו סדר ולחצו מיזוג — תוך 10 שניות יש חבילת חומר לימוד אחת מסודרת.',tipEn:'Drag PDFs into the merge tool, set the order, click merge — in 10 seconds you have one clean study packet.',url:'https://tools.pdf24.org/he/',video:'',guide:'',icon:'📋',iconBg:'coral',favicon:'https://tools.pdf24.org/favicon.ico',cat:2,subj:0,pricing:'free',difficulty:'easy',lang:'multilang',mobile:true,login:false,hasVideo:false,featured:true},
  {id:2,name:'GuyAI',tags:['מערך שיעור','יצירת מבחנים','יצירת שאלות','הכנה לבגרות','שיעורי בית','פתרון שאלות מתמטיות'],shortHe:'מורה פרטי AI ישראלי — פתרון תרגילים, מבחנים ואימון 24/7',shortEn:'Israeli AI private tutor — exercises, exams and practice 24/7',fullHe:'GuyAI הוא מורה פרטי AI שפותח בישראל לתלמידי תיכון ואקדמיה. כולל פתרון תרגילים בצילום, פתרון מבחנים מ-PDF, מחולל מבחנים, סיכומים, אבחון רמה ותוכנית לימוד אישית. ממשק עברי מלא.',fullEn:'GuyAI is an Israeli AI private tutor for high school and university. Photo exercise solving, PDF exam solving, quiz generator, summaries, level diagnosis, and personalized study plans.',whyEduHe:'GuyAI בנוי סביב הצרכים של התלמיד הישראלי — תוכנית הלימודים, הבגרויות ושפת הממשק. מורים יכולים לבנות מבחנים, מערכי שיעור ולעקוב אחר תלמידים — הכל בעברית.',whyEduEn:'GuyAI is built around Israeli student needs — curriculum, Bagrut exams, and Hebrew interface. Teachers can build tests, lesson plans, and track student progress.',tipHe:'השתמשו בסטודיו מערכי שיעור AI בתפריט המורים — הזינו נושא ורמת כיתה וקבלו מערך שיעור מובנה תוך דקות.',tipEn:'Use the AI Lesson Plan Studio in the teachers menu — enter a topic and grade level and get a structured lesson plan in minutes.',url:'https://www.guyai.co.il/',video:'',guide:'',icon:'🏫',iconBg:'blue',favicon:'https://www.guyai.co.il/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'he',mobile:true,login:true,hasVideo:false,featured:true},
  {id:3,name:'NotebookLM',tags:['סיכום מסמך','הכנת חומרים','שאלות על טקסט','פודקאסט מחומר לימוד','מחקר'],shortHe:'כלי AI של גוגל לניתוח מסמכים, סיכום ויצירת פודקאסט',shortEn:'Google AI tool to analyze documents, summarize and create podcasts',fullHe:'NotebookLM הוא כלי AI של גוגל שמאפשר להעלות מסמכים, מצגות, קישורים ווידאו ולשאול עליהם שאלות. הכלי מייצר סיכומים, ציר זמן, מפת נושאים, ואפילו פודקאסט שיחה בין שני קריינים.',fullEn:'NotebookLM by Google lets you upload documents, slides, links, and videos, then ask questions. It generates summaries, timelines, topic maps, and an audio podcast conversation.',whyEduHe:'מורה שצריך לסכם יחידה שלמה, לייצר שאלות מחומר קיים, או ליצור פודקאסט מרתק לתלמידים — NotebookLM עושה את זה מהחומרים שכבר יש לו.',whyEduEn:'A teacher who needs to summarize a unit, create questions from existing material, or produce an engaging podcast — NotebookLM does it all from materials you already have.',tipHe:'העלו את כל חומרי היחידה (מצגת + מאמר), לחצו "Generate Podcast" — תוך דקות יש שיחה מעניינת שאפשר לשלוח לתלמידים.',tipEn:'Upload all unit materials (slides + article), click "Generate Podcast" — in minutes you have an engaging conversation to share with students.',url:'https://notebooklm.google/',video:'',guide:'https://letsai.co.il/aitools/notebooklm/',icon:'📓',iconBg:'green',favicon:'https://notebooklm.google/favicon.ico',cat:0,subj:0,pricing:'free',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:false,featured:true},
  {id:4,name:'Claude',tags:['מערך שיעור','הכנת חומרים','יצירת שאלות','משוב לתלמידים','עיבוד מסמכים'],shortHe:'עוזר AI מתקדם לכתיבה, ניתוח ויצירת חומרי הוראה',shortEn:'Advanced AI assistant for writing, analysis and teaching materials',fullHe:'Claude הוא עוזר AI של Anthropic, מצטיין במשימות כתיבה ארוכה, עיבוד מסמכים גדולים ויצירת חומרי הוראה מורכבים. תומך בהעלאת קבצי PDF, Word ותמונות לניתוח.',fullEn:'Claude by Anthropic excels at long-form writing, processing large documents, and creating complex teaching materials. Supports uploading PDFs, Word files and images.',whyEduHe:'כשצריך לכתוב מערך שיעור מפורט, לסכם מאמר ארוך, לכתוב גרסאות מותאמות לרמות שונות, או לנסח משוב עדין לתלמיד — Claude נותן תוצאות איכותיות גם על משימות ארוכות.',whyEduEn:'When you need a detailed lesson plan, a long article summarized, texts adapted for different levels, or carefully worded student feedback — Claude delivers quality results.',tipHe:'העלו קובץ PDF של ספר לימוד ובקשו: "חלץ את הרעיונות המרכזיים מהפרק הזה וכתוב 3 שאלות לדיון כיתתי" — חומר לשיעור תוך רגע.',tipEn:'Upload a textbook PDF and ask: "Extract the key ideas from this chapter and write 3 discussion questions" — instant lesson material.',url:'https://claude.ai/',video:'',guide:'',icon:'🤍',iconBg:'purple',favicon:'https://claude.ai/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:5,name:'MagicSchool AI',tags:['מערך שיעור','דפי עבודה','יצירת מבחנים','משוב לתלמידים','רובריקה','הבדלה'],shortHe:'80+ כלים AI מיועדים במיוחד למורים',shortEn:'80+ AI tools built specifically for teachers',fullHe:'MagicSchool AI הוא כלי שבנוי ספציפית למורים, עם למעלה מ-80 כלים מובנים: יצירת מבחנים, מערכי שיעור, דפי עבודה, משוב לתלמידים, הכנת IEP ועוד — בלי לנסח פרומפטים.',fullEn:'MagicSchool AI is built specifically for teachers, with 80+ built-in tools: quizzes, lesson plans, worksheets, student feedback, IEPs, and more — no prompt engineering.',whyEduHe:'מורים שלא רוצים להתעסק עם פרומפטים — MagicSchool עונה על הצורך. בוחרים כלי, ממלאים פרטים פשוטים, ומקבלים תוצר. חוסך שעות עבודה שבועיות.',whyEduEn:"Teachers who don't want to deal with prompts — MagicSchool answers that. Pick a tool, fill simple details, get a result. Saves hours weekly.",tipHe:'נסו את "Rubric Generator" — הכניסו מטלה ותקבלו רובריקת הערכה עם קריטריונים ברמות שונות.',tipEn:'Try "Rubric Generator" — enter an assignment and get a rubric with criteria at different performance levels.',url:'https://www.magicschool.ai/',video:'https://www.youtube.com/watch?v=_3gpmBTAhgU',guide:'',icon:'🏫',iconBg:'green',favicon:'https://www.magicschool.ai/favicon.ico',cat:0,subj:0,pricing:'free',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:true},
  {id:6,name:'Perplexity',tags:['מחקר','חיפוש מידע','הכנת חומרים','מקורות מאומתים','שאלות עיון'],shortHe:'מנוע חיפוש AI עם מקורות מאומתים וסיכום מיידי',shortEn:'AI search engine with verified sources and instant summaries',fullHe:'Perplexity הוא מנוע חיפוש AI שמספק תשובות מסוכמות עם ציטוטים למקורות מאומתים. הוא מחפש את האינטרנט בזמן אמת ומציין תמיד את המקור לכל מידע.',fullEn:'Perplexity is an AI search engine providing summarized answers with citations to verified sources. It searches the web in real time and always cites every piece of information.',whyEduHe:'כשמכינים שיעור על נושא עכשווי — Perplexity מייצר סיכום מהיר עם קישורים למקורות שאפשר לצטט. מסייע גם לתלמידים ללמוד לחפש מידע אמין.',whyEduEn:'When preparing a lesson on a current topic — Perplexity generates a fast summary with citable sources. Also helps students learn to find reliable information.',tipHe:'הפנו תלמידים ל-Perplexity לעבודות חקר — כל תשובה מגיעה עם מקורות מאומתים, לעומת ChatGPT שלעיתים ממציא.',tipEn:'Send students to Perplexity for research — every answer comes with verified sources, unlike ChatGPT which sometimes fabricates.',url:'https://www.perplexity.ai/',video:'',guide:'',icon:'🔍',iconBg:'blue',favicon:'https://www.perplexity.ai/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:false,hasVideo:false,featured:false},
  {id:7,name:'ChatGPT',tags:['מערך שיעור','דפי עבודה','יצירת שאלות','משוב לתלמידים','הבדלה'],shortHe:'עוזר AI רב-תכליתי ליצירת תוכן, שאלות ומערכי שיעור',shortEn:'Multipurpose AI assistant for content, questions and lesson plans',fullHe:'ChatGPT של OpenAI הוא עוזר AI רב-תכליתי שמאפשר ליצור טקסטים, שאלות, מערכי שיעור ודפי עבודה. תומך בהעלאת תמונות, קבצים ומסמכים לניתוח.',fullEn:'ChatGPT by OpenAI is a multipurpose AI assistant for creating texts, questions, lesson plans, and worksheets. Supports uploading images, files and documents.',whyEduHe:'ChatGPT מאפשר למורה להפוך כל נושא לחומר הוראה תוך דקות — שאלות ברמות שונות, מערכי שיעור, הסברים פשוטים, ותאמת טקסטים לרמות קריאה שונות.',whyEduEn:'ChatGPT lets teachers turn any topic into teaching material in minutes — questions at different levels, lesson plans, simplified explanations.',tipHe:'בקשו: "כתוב 6 שאלות על [נושא]: 2 ידע, 2 הבנה, 2 יישום לפי בלום" — מקבלים מבחן מאוזן תוך שניות.',tipEn:'Ask: "Write 6 questions on [topic]: 2 knowledge, 2 comprehension, 2 application per Bloom" — a balanced quiz in seconds.',url:'https://chatgpt.com/',video:'',guide:'',icon:'🤖',iconBg:'blue',favicon:'https://chatgpt.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:8,name:'Gemini',tags:['מערך שיעור','הכנת חומרים','יצירת תמונות','סיכום מסמך','Google Workspace'],shortHe:'AI של גוגל — כתיבה, תמונות ושילוב עם Google Workspace',shortEn:'Google AI — writing, images and Google Workspace integration',fullHe:'Gemini הוא עוזר ה-AI של גוגל שמשתלב ישירות ב-Google Docs, Slides ו-Sheets ותומך ביצירת תמונות. מאפשר לסכם מסמכים, ליצור מצגות ולנתח נתונים.',fullEn:"Gemini is Google's AI that integrates with Google Docs, Slides, and Sheets and supports image generation. Summarize documents, create presentations, and analyze data.",whyEduHe:'מורים שכבר עובדים עם Google for Education לא צריכים לעבור כלי — Gemini נמצא בדיוק שם, ישירות בתוך הכלים המוכרים.',whyEduEn:"Teachers already using Google for Education don't need to switch — Gemini is right there, inside the familiar tools.",tipHe:'ב-Google Slides: לחצו "עזר ב-AI", הכניסו נושא ומספר שקופיות — תקבלו מצגת מלאה תוך 30 שניות.',tipEn:'In Google Slides: click "Help me visualize", enter topic and slide count — get a full presentation in 30 seconds.',url:'https://gemini.google.com/',video:'',guide:'',icon:'✨',iconBg:'amber',favicon:'https://gemini.google.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},
  {id:9,name:'Google AI Studio',tags:['בניית כלים','עיבוד מסמכים','הכנת חומרים','יצירת שאלות','הגדרות מותאמות'],shortHe:'סביבת AI מתקדמת של גוגל לבניית כלים חינוכיים',shortEn:"Google's advanced AI environment for building custom educational tools",fullHe:'Google AI Studio מאפשר לעבוד עם מודל Gemini בצורה מתקדמת — פרומפטים מורכבים, עיבוד קבצים גדולים, הגדרת הוראות קבועות ובניית כלים לשימוש חוזר. נגיש ללא תשלום.',fullEn:"Google AI Studio lets you work with Gemini in advanced mode — complex prompts, large file processing, persistent instructions, and reusable tools. Free to access.",whyEduHe:'מורים שרוצים ליצור כלי AI מותאם אישית — "תמיד עבוד בעברית כמורה לביולוגיה" — AI Studio מאפשר להגדיר הוראות קבועות שנשמרות.',whyEduEn:'Teachers wanting a custom AI tool — "always work in Hebrew as a biology teacher" — AI Studio lets you set persistent instructions that save time.',tipHe:'הגדירו System Instruction: "אתה מורה לכימיה. תמיד ענה בעברית. הצג נוסחאות בצורה ברורה." — כל שיחה מתחילה עם הגדרות אלו.',tipEn:'Set a System Instruction: "You are a chemistry teacher. Always answer in Hebrew. Present formulas clearly." — every conversation starts with these settings.',url:'https://aistudio.google.com/',video:'',guide:'',icon:'🔬',iconBg:'teal',favicon:'https://aistudio.google.com/favicon.ico',cat:9,subj:0,pricing:'free',difficulty:'medium',lang:'en',mobile:false,login:true,hasVideo:false,featured:false},
  {id:10,name:'Gemini Image Generation',tags:['יצירת תמונות','איורים','ויזואלים לשקופיות','תמונות לחומר לימוד'],shortHe:'יצירת תמונות AI איכותיות עם Imagen 3 של גוגל',shortEn:"High-quality AI image generation with Google's Imagen 3",fullHe:'Gemini Image Generation מאפשר ליצור תמונות איכותיות מתיאור טקסטואלי עם Imagen 3. נגיש דרך Gemini Advanced, מתאים לאיורים לחומרי לימוד, מצגות וכרזות.',fullEn:"Gemini Image Generation creates high-quality images from text descriptions using Google's Imagen 3. Accessible through Gemini Advanced, ideal for learning materials and presentations.",whyEduHe:'במקום לחפש שעות אחר תמונה מתאימה, מתארים במילים ומקבלים איור מדויק לנושא. מתאים לדפי עבודה, מצגות ופוסטרים לכיתה.',whyEduEn:'Instead of searching for the perfect image, describe it and get a precise illustration. Great for worksheets, presentations, and classroom posters.',tipHe:'לאיור מדעי: "תרשים פשוט של מחזור החנקן עם חיצים, ברקע לבן, סגנון ספר לימוד" — מוכן ישירות לדף עבודה.',tipEn:'For a science diagram: "Simple nitrogen cycle diagram with arrows, white background, textbook style" — ready for a worksheet.',url:'https://gemini.google/overview/image-generation/',video:'',guide:'',icon:'🖼️',iconBg:'pink',favicon:'https://www.google.com/favicon.ico',cat:4,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:false,login:true,hasVideo:false,featured:false},
  {id:11,name:'Gamma',tags:['יצירת מצגות','הכנת חומרים','מצגת לשיעור','סיכום נושא','הכנה מהירה'],shortHe:'יצירת מצגות מקצועיות מלאות מתוך טקסט תוך שניות',shortEn:'Create full professional presentations from text in seconds',fullHe:'Gamma מייצרת מצגת מלאה תוך 30 שניות — מקלידים נושא ומספר שקופיות ומקבלים עיצוב, תוכן ותמונות. אפשר לערוך ולייצא ל-PDF או PowerPoint.',fullEn:'Gamma generates a full presentation in 30 seconds — type a topic and slide count and get design, content, and images. Edit and export to PDF or PowerPoint.',whyEduHe:'כשצריך להכין מצגת לשיעור מחר — Gamma היא הפתרון. אין צורך בניסיון עיצובי. תוך דקה יש מצגת שנראית מקצועית.',whyEduEn:"When you need a presentation for tomorrow's lesson — Gamma is the answer. No design experience needed. In a minute you have a professional-looking presentation.",tipHe:'ציינו בפרומפט: "מצגת על [נושא] ל-10 שקופיות, לכיתה ט, כולל שאלות חשיבה" — מקבלים מצגת מותאמת גיל.',tipEn:'In the prompt: "Presentation on [topic] for 10 slides, 9th grade, include thinking questions" — age-appropriate result.',url:'https://gamma.app/',video:'https://www.youtube.com/watch?v=7bF7IUVfBcU',guide:'',icon:'⚡',iconBg:'amber',favicon:'https://gamma.app/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:false},
  {id:12,name:'Canva',tags:['יצירת מצגות','דפי עבודה','עיצוב גרפי','עלון הורים','כרזה לכיתה','תבניות מוכנות'],shortHe:'עיצוב מצגות, דפי עבודה וחומרים ויזואליים עם AI',shortEn:'Design presentations, worksheets and visual materials with AI',fullHe:'Canva היא פלטפורמת עיצוב עם AI מובנה — יצירת מצגות, דפי עבודה, כרזות ועלוני הורים. Magic Write כותב תוכן לפי בקשה ויש אלפי תבניות חינוכיות מוכנות.',fullEn:'Canva is a design platform with built-in AI — create presentations, worksheets, posters, and parent newsletters. Magic Write drafts content on request and thousands of education templates are available.',whyEduHe:'גם מורים בלי ניסיון עיצובי מייצרים עם Canva חומרים מקצועיים. בוחרים תבנית, מחליפים טקסט, ומשתמשים ב-Magic Write — העלון מוכן לפני שהזמנקה נגמרת.',whyEduEn:"Even teachers without design experience create professional materials with Canva. Pick a template, swap text, use Magic Write — the handout is done before the break ends.",tipHe:'לפני יום הורים: תבנית "Parent Newsletter", החליפו כותרת, לחצו Magic Write — "קצר ל-3 נקודות בשפה חיובית". מוכן תוך שתי דקות.',tipEn:'Before parent evening: "Parent Newsletter" template, swap headline, click Magic Write — "Summarize into 3 positive points". Done in two minutes.',url:'https://www.canva.com/',video:'',guide:'',icon:'🎨',iconBg:'teal',favicon:'https://www.canva.com/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:13,name:'ivrit.ai',tags:['תמלול','תמלול עברית','הכנת חומרים','נגישות','תיעוד שיעור'],shortHe:'תמלול חינמי לעברית מדוברת — ממשק פשוט ללא הרשמה',shortEn:'Free Hebrew speech transcription — simple interface, no sign-up',fullHe:'ivrit.ai מציעה כלי תמלול חינמי לעברית מדוברת, מבוסס על מודל Whisper המותאם לעברית. מעלים קובץ אודיו או וידאו ומקבלים תמליל טקסט תוך דקות. ממשק עברי, אינו דורש הרשמה.',fullEn:'ivrit.ai offers a free Hebrew speech transcription tool based on a Hebrew-adapted Whisper model. Upload an audio or video file and get a text transcript in minutes. No sign-up required.',whyEduHe:'תמלול שיעור, הרצאה, או ראיון בעברית — ivrit.ai מייצרת טקסט שאפשר לערוך, לסכם ולשלוח לתלמידים. מיוחד לתוכן עברי שכלים אחרים לא מתמללים מספיק טוב.',whyEduEn:'Transcribing a Hebrew lesson, lecture, or interview — ivrit.ai generates text you can edit, summarize, and send to students. Especially useful for Hebrew content.',tipHe:'הקליטו הסבר קולי של נושא, העלו ל-ivrit.ai — תוך דקות יש טקסט שאפשר לתקן ולהפוך לדף הסבר מודפס לתלמידים.',tipEn:'Record an audio explanation of a topic, upload to ivrit.ai — in minutes you have text to edit and turn into a printed explanation sheet.',url:'https://www.ivrit.ai/he/174-2/',video:'',guide:'',icon:'🎙️',iconBg:'purple',favicon:'https://www.ivrit.ai/favicon.ico',cat:6,subj:0,pricing:'free',difficulty:'easy',lang:'he',mobile:false,login:false,hasVideo:false,featured:false},
  {id:14,name:'ElevenLabs',tags:['יצירת אודיו','הקראת טקסט','נגישות','קריינות','יצירת תוכן'],shortHe:'יצירת קריינות ואודיו מטקסט עם קולות AI ריאליסטיים',shortEn:'Create voiceovers and audio from text with realistic AI voices',fullHe:'ElevenLabs מייצרת קריינות AI ריאליסטית מטקסט כתוב. אפשר לבחור מאות קולות, ולייצא קבצי MP3 לשימוש בסרטונים, מצגות ותכנים חינוכיים.',fullEn:'ElevenLabs generates realistic AI voiceovers from written text. Choose from hundreds of voices and export MP3 files for use in videos, presentations, and educational content.',whyEduHe:'מורים שמכינים סרטוני הסבר, פודקאסטים חינוכיים, או חומר נגיש לתלמידים עם לקות ראייה — ElevenLabs ממיר כל טקסט לקריינות מקצועית בלי ציוד הקלטה.',whyEduEn:'Teachers creating explanation videos, educational podcasts, or accessible materials — ElevenLabs converts any text to professional voiceover without recording equipment.',tipHe:'כתבו סיכום קצר של נושא, הדביקו ב-ElevenLabs, בחרו קול נעים — תוך דקה יש קובץ אודיו להכניס ישירות למצגת.',tipEn:'Write a short topic summary, paste into ElevenLabs, choose a voice — in one minute you have an audio file to embed in a presentation.',url:'https://elevenlabs.io/',video:'',guide:'',icon:'🔊',iconBg:'teal',favicon:'https://elevenlabs.io/favicon.ico',cat:7,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},
  {id:15,name:'Suno',tags:['יצירת מוזיקה','יצירת אודיו','שירי לימוד','שירי ילדים','פעילות כיתתית'],shortHe:'יצירת שירים מקוריים מתוך טקסט — AI מוזיקלי',shortEn:'Create original songs from text — musical AI',fullHe:'Suno מייצר שירים מלאים — לחן, מקצב, ביצוע ומילים — מתיאור טקסטואלי קצר. אפשר לציין ז\'אנר, מצב רוח, שפה וסגנון ולקבל שיר גמור תוך שניות.',fullEn:"Suno generates full songs — melody, rhythm, performance and lyrics — from a short text description. Specify genre, mood, language, and style for a finished song in seconds.",whyEduHe:'יצירת שיר על נושא לימודי היא דרך נפלאה לחזרה. "כתוב שיר פופ על מחזור המים לכיתה ה" — תוך שניות יש שיר שהתלמידים ישמחו לשיר וליזכור.',whyEduEn:'Creating a song about a learning topic is a great review technique. "Write a pop song about the water cycle for 5th grade" — in seconds you have a song students will enjoy.',tipHe:'לפני יחידת לימוד — צרו שיר ז\'אנגל קצר על המונחים המרכזיים ושלחו לתלמידים. המוח זוכר מוזיקה טוב יותר מרשימות.',tipEn:"Before a unit — create a short jingle about the key terms and share it with students. The brain remembers music better than lists.",url:'https://suno.com/home',video:'',guide:'',icon:'🎵',iconBg:'pink',favicon:'https://suno.com/favicon.ico',cat:7,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},

  if(e.target === document.getElementById('admin-overlay')) closeAdmin();

function switchTab(tab){
  adminTab = tab;
  ['add','manage','settings'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='add') renderAddTab();
  else if(tab==='manage') renderManageTab();
  else renderSettingsTab();
}

// ─── AI FILL ─────────────────────────────────────────────────
async function aiFill(){
  const apiKey = getApiKey();
  const toolName = document.getElementById('ai-name-input').value.trim();
  if(!toolName) return;
  if(!apiKey){ setAiStatus('error', LANG==='he'?'⚠️ הוסף מפתח API תחת "הגדרות"':'⚠️ Add an API key under "Settings"'); return; }

  const btn = document.getElementById('ai-fill-btn');
  btn.disabled = true;
  setAiStatus('loading', t('aiLoading'));

  const catNames = CATS_EN.join(', ');
  const subjNames = SUBJS_EN.join(', ');

  const prompt = `You are a helpful assistant that knows about AI tools for education.
Given the tool name "${toolName}", provide accurate information in JSON format.
Return ONLY valid JSON, no markdown, no extra text.

{
  "name": "exact tool name",
  "tags": ["3-6 specific Hebrew use-case tags for teachers, e.g.: מערך שיעור, דפי עבודה, שאלות מבחן, משוב לתלמידים, הכנה לבגרות, פעילות כיתתית, הנגשה, תמלול שיעור, סיכום מסמך, עלון הורים, כרטיסיות זיכרון, מיזוג PDF, צילום שאלה, רובריקה, IEP"],
  "shortHe": "תיאור קצר של הכלי בעברית, עד 12 מילים",
  "shortEn": "Short description in English, up to 12 words",
  "fullHe": "הסבר מורחב בעברית על הכלי, 3-4 משפטים. מה הכלי עושה?",
  "fullEn": "Full description in English, 3-4 sentences. What does the tool do?",
  "whyEduHe": "למה זה טוב לחינוך? 2-3 משפטים בעברית על הערך הפדגוגי למורים. כתוב בגוף שני, ספציפי.",
  "whyEduEn": "Why is this good for education? 2-3 sentences in English on the pedagogical value.",
  "tipHe": "טיפ פדגוגי: הקשר ספציפי + פעולה מדויקת + תוצאה. ניתן לביצוע מחר.",
  "tipEn": "Pedagogical tip: specific context + exact action + result. Actionable tomorrow.",
  "url": "official website URL",
  "videoUrl": "a real YouTube tutorial URL for this tool, or empty string",
  "icon": "single relevant emoji",
  "iconBg": "one of: blue,teal,amber,coral,purple,green,pink",
  "favicon": "https://domain.com/favicon.ico",
  "catIndex": "number 0-9: 0=lesson prep,1=text,2=pdf,3=presentations,4=images,5=quizzes,6=transcription,7=video,8=self-learning,9=general",
  "subjIndex": "number 0-11: 0=all,1=math,2=hebrew,3=english,4=history,5=science,6=bible,7=civics,8=biology,9=chemistry,10=geography,11=special-ed",
  "pricing": "free/partial/paid",
  "difficulty": "easy/medium/advanced",
  "lang": "he/en/multilang",
  "mobile": true or false,
  "login": true or false
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key': apiKey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const data = await resp.json();
    if(data.error){ setAiStatus('error', t('aiErr')+': '+data.error.message); btn.disabled=false; return; }
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const json = JSON.parse(text);
    // fill form
    setVal('f-name', json.name || toolName);
    setVal('f-tags', (json.tags||[]).join(', '));
    setVal('f-short-he', json.shortHe || '');
    setVal('f-short-en', json.shortEn || '');
    setVal('f-full-he', json.fullHe || '');
    setVal('f-full-en', json.fullEn || '');
    setVal('f-why-he', json.whyEduHe || '');
    setVal('f-why-en', json.whyEduEn || '');
    setVal('f-tip-he', json.tipHe || '');
    setVal('f-tip-en', json.tipEn || '');
    setVal('f-url', json.url || '');
    setVal('f-video', json.videoUrl || '');
    setVal('f-guide', json.guideUrl || '');
    setVal('f-icon', json.icon || '🔧');
    setSelectByValue('f-cat', String(json.catIndex || 0));
    setSelectByValue('f-subj', String(json.subjIndex || 0));
    setSelectByValue('f-pricing', json.pricing || 'partial');
    setSelectByValue('f-diff', json.difficulty || 'easy');
    setSelectByValue('f-lang', json.lang || 'multilang');
    setAiStatus('done', t('aiDone') + ' ✓');
  } catch(e) {
    setAiStatus('error', t('aiErr'));
  }
  btn.disabled = false;
}

function setVal(id, val){ const el=document.getElementById(id); if(el) el.value=val; }
function setSelectByValue(id, val){ const el=document.getElementById(id); if(el){ for(let o of el.options) if(o.value===val){ el.value=val; break; } } }
function setAiStatus(type, msg){ const el=document.getElementById('ai-status'); if(el){ el.className='ai-status '+type; el.textContent=msg; } }

// ─── SUBMIT TOOL ─────────────────────────────────────────────
function submitTool(){
  const name = document.getElementById('f-name').value.trim();
  if(!name) return;
  const catIdx = parseInt(document.getElementById('f-cat').value) || 0;
  const newTool = {
    id: Date.now(),
    tags: (document.getElementById('f-tags').value||'').split(',').map(s=>s.trim()).filter(Boolean),
    shortEn: document.getElementById('f-short-en').value,
    fullHe: document.getElementById('f-full-he').value,
    fullEn: document.getElementById('f-full-en').value,
    whyEduHe: document.getElementById('f-why-he').value,
    whyEduEn: document.getElementById('f-why-en').value,
    tipHe: document.getElementById('f-tip-he').value,
    tipEn: document.getElementById('f-tip-en').value,
    url: document.getElementById('f-url').value,
    video: document.getElementById('f-video').value,
    guide: document.getElementById('f-guide').value,
    icon: document.getElementById('f-icon').value || '🔧',
    iconBg: ICON_COLORS[catIdx % ICON_COLORS.length],
    favicon: '',
    cat: catIdx,
    subj: parseInt(document.getElementById('f-subj').value) || 0,
    pricing: document.getElementById('f-pricing').value,
    difficulty: document.getElementById('f-diff').value,
    lang: document.getElementById('f-lang').value,
    mobile: false, login: false,
    hasVideo: !!document.getElementById('f-video').value,
    featured: false
  };
  tools.push(newTool);
  saveTools();
  const succ = document.getElementById('f-success');
  succ.style.display = 'block';
  setTimeout(()=>{ succ.style.display='none'; renderAddTab(); }, 2000);
  renderSidebar();
}

// ─── MANAGE TAB ───────────────────────────────────────────────
function renderManageTab(){
  if(!tools.length){ document.getElementById('admin-body').innerHTML=`<div class="empty-state"><div class="empty-title">${t('noTools')}</div></div>`; return; }
  const rows = tools.map(tool=>`
    <div class="tool-row">
      <div class="tool-row-icon">${tool.icon}</div>
      <div class="tool-row-info">
        <div class="tool-row-name">${tool.name}</div>
        <div class="tool-row-cat">${LANG==='he'?CATS_HE[tool.cat]:CATS_EN[tool.cat]}</div>
      </div>
      <div class="tool-row-actions">
        <button class="btn-feature${tool.featured?' on':''}" onclick="toggleFeatured(${tool.id})">${tool.featured?'★ '+t('featured'):'☆ '+t('featured')}</button>
        <button class="btn-delete" onclick="deleteTool(${tool.id})">${LANG==='he'?'מחק':'Delete'}</button>
      </div>
    </div>
  `).join('');
  document.getElementById('admin-body').innerHTML = `<div>${rows}</div>`;
}

function toggleFeatured(id){
  const tool = tools.find(t=>t.id===id);
  if(tool){ tool.featured=!tool.featured; saveTools(); renderManageTab(); renderAll(); }
}

function deleteTool(id){
  const msg = LANG==='he'?'למחוק את הכלי?':'Delete this tool?';
  if(!confirm(msg)) return;
  tools = tools.filter(t=>t.id!==id);
  saveTools();
  renderManageTab();
  renderAll();
}

    const q = state.searchQ.toLowerCase();
    if(q){
      const tagStr = (tool.tags||[]).join(' ');
      const hay = (tool.name+' '+tool.shortHe+' '+tool.shortEn+' '+tagStr+' '+(LANG==='he'?CATS_HE[tool.cat]:CATS_EN[tool.cat])).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(state.activeCat>=0 && tool.cat!==state.activeCat) return false;
    if(state.activeSubj>=1 && tool.subj!==state.activeSubj && tool.subj!==0) return false;
    if(state.activePricing!=='all' && tool.pricing!==state.activePricing) return false;
    if(state.activeTag && !(tool.tags||[]).includes(state.activeTag)) return false;
    return true;
  });
}

function getAllTags(){
  const counts = {};
  tools.forEach(tool=>(tool.tags||[]).forEach(tag=>{ counts[tag]=(counts[tag]||0)+1; }));
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([tag,count])=>({tag,count}));
}

// ─── RENDER ───────────────────────────────────────────────────
function renderAll(){ renderSidebar(); renderContent(); }

function renderSidebar(){
  const catCounts = Array(CATS_HE.length).fill(0);
  tools.forEach(t=>catCounts[t.cat]=(catCounts[t.cat]||0)+1);
  let html = `<div class="sidebar-section"><div class="sidebar-label">${t('cats')}</div>`;
  html += navItem(-1, t('allTools'), tools.length, state.activeCat===-1, `setCat(-1)`);
  t('cats').forEach((c,i)=>html += navItem(i, c, catCounts[i]||0, state.activeCat===i, `setCat(${i})`));
  html += `</div><div class="sidebar-section"><div class="sidebar-label">${t('subjs')}</div>`;
  t('subjs').forEach((s,i)=>{
    const cnt = i===0 ? tools.filter(x=>x.subj===0).length : tools.filter(x=>x.subj===i||x.subj===0).length;
    html += navItem(i, s, cnt, state.activeSubj===i, `setSubj(${i})`);
  });
  const pc = { all:tools.length, free:tools.filter(x=>x.pricing==='free').length, partial:tools.filter(x=>x.pricing==='partial').length, paid:tools.filter(x=>x.pricing==='paid').length };
  html += `</div><div class="sidebar-section"><div class="sidebar-label">${t('pricing')}</div>`;
  [['all',t('allTools')],['free',t('free')],['partial',t('partial')],['paid',t('paid')]].forEach(([k,l])=>{
    html += `<div class="nav-item${state.activePricing===k?' active':''}" onclick="setPrice('${k}')"><span class="nav-item-label">${l}</span><span class="nav-count">${pc[k]}</span></div>`;
  });
  html += `</div>`;
  document.getElementById('sidebar').innerHTML = html;
  const mp = document.getElementById('mobile-sidebar-content');
  if(mp && document.getElementById('mobile-sidebar-overlay').style.display !== 'none') mp.innerHTML = html;
}

function navItem(idx, label, count, active, action){
  return `<div class="nav-item${active?' active':''}" onclick="${action}"><span class="nav-item-label">${label}</span><span class="nav-count">${count}</span></div>`;
}

function setCat(i){ state.activeCat=i; closeMobileMenu(); renderAll(); }
function setSubj(i){ state.activeSubj=i; closeMobileMenu(); renderAll(); }
function setPrice(p){ state.activePricing=p; closeMobileMenu(); renderAll(); }

function renderContent(){
  const el = document.getElementById('content');
  if(state.page==='list') el.innerHTML = renderList();
  else if(state.page==='detail') el.innerHTML = renderDetail(state.selectedId);
  attachListEvents();
}

function attachListEvents(){
  const si = document.getElementById('search-input');
  if(si){ si.addEventListener('input', e=>{ state.searchQ=e.target.value; renderContent(); const ni=document.getElementById('search-input'); if(ni){ni.focus();ni.setSelectionRange(state.searchQ.length,state.searchQ.length);} }); }
}

function pricingTag(p){ const cls=p==='free'?'t-free':p==='partial'?'t-partial':'t-paid'; const lbl=p==='free'?t('free'):p==='partial'?t('partial'):t('paid'); return `<span class="tag ${cls}">${lbl}</span>`; }
function iconBg(bg){ return ICONS_MAP[bg]||'var(--blue-bg)'; }
function langLabel(l){ return l==='he'?t('he'):l==='en'?t('en'):t('multi'); }
function diffLabel(d){ return d==='easy'?t('easy'):d==='medium'?t('medium'):t('advanced'); }

function renderList(){
  const filtered = getFiltered();
  const allTags = getAllTags();
  const catLabel = state.activeCat>=0 ? t('cats')[state.activeCat] : t('allTools');

  // תגיות שימוש — מכווץ עם כפתור הרחבה
  const expandLabel = LANG==='he' ? 'כל התגיות ▾' : 'All tags ▾';
  const collapseLabel = LANG==='he' ? 'סגור ▴' : 'Close ▴';
  const tagsRow = `
    <div style="display:flex;align-items:flex-start;gap:8px">
      <div class="chips-row" id="tags-chips-row" style="flex:1">
        <button class="chip${!state.activeTag?' active':''}" onclick="setTag('')">${LANG==='he'?'הכל':'All'}</button>
        ${allTags.map(({tag,count})=>`<button class="chip${state.activeTag===tag?' active':''}" onclick="setTag('${tag.replace(/'/g,"\\'")}')"><span>${tag}</span><span style="opacity:.5;font-size:10px;margin-inline-start:4px">${count}</span></button>`).join('')}
      </div>
      <button id="tags-toggle-btn" onclick="toggleTagsExpand()" style="flex-shrink:0;padding:4px 10px;border-radius:99px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;margin-top:2px">${expandLabel}</button>
    </div>`;

  let cards = '';
  if(!filtered.length){
    cards = `<div class="empty-state"><div class="empty-title">${t('noResults')}</div><div class="empty-sub">${t('noResultsSub')}</div></div>`;
  } else {
    cards = filtered.map(tool=>{
      const short = LANG==='he'?tool.shortHe:tool.shortEn;
      const cat = LANG==='he'?CATS_HE[tool.cat]:CATS_EN[tool.cat];
      const iconContent = tool.favicon
        ? `<img src="${tool.favicon}" onerror="this.style.display='none';this.nextSibling.style.display='block'" alt=""><span style="display:none">${tool.icon}</span>`
        : tool.icon;
      const usageTags = (tool.tags||[]).slice(0,3).map(tag=>
        `<span class="tag t-use" style="cursor:pointer" onclick="event.stopPropagation();setTag('${tag.replace(/'/g,"\\'")}' )">${tag}</span>`
      ).join('');
      return `<div class="card${tool.featured?' featured':''}" onclick="goDetail(${tool.id})">
        <div class="card-top">
          <div class="card-icon" style="background:${iconBg(tool.iconBg)}">${iconContent}</div>
          <div class="card-titles">
            <div class="card-name">${tool.name}${tool.featured?` <span class="featured-badge">★ ${t('featured')}</span>`:''}</div>
            <div class="card-short">${short}</div>
          </div>
        </div>
        <div class="card-tags">
          <span class="tag t-cat">${cat}</span>
          ${usageTags}
        </div>
        <div class="card-footer">
          <div style="display:flex;gap:8px">
            ${tool.hasVideo?`<span class="meta-badge"><span class="video-dot"></span>${t('hasVideo')}</span>`:''}
            ${tool.pricing==='free'?`<span class="meta-badge" style="color:var(--teal)">✓ ${t('free')}</span>`:''}
          </div>
          <div class="card-btns">
            <button class="btn-xs" onclick="event.stopPropagation();goDetail(${tool.id})">${t('details')}</button>
            <button class="btn-xs primary" onclick="event.stopPropagation();window.open('${tool.url}','_blank')">${t('open')}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  return `
    <div class="search-wrap">
      <div class="search-row">
        <input class="search-input" id="search-input" type="text" placeholder="${t('searchPh')}" value="${state.searchQ}">
        <button class="search-btn">${t('search')}</button>
      </div>
      ${tagsRow}
    </div>
    <div class="results-header">
      <div class="results-count">${filtered.length} ${t('results')}${state.activeTag?' — '+state.activeTag:' — '+catLabel}</div>
    </div>
    <div class="cards-grid">${cards}</div>
  `;
}

function goDetail(id){ state.page='detail'; state.selectedId=id; renderContent(); window.scrollTo(0,0); }
function goList(){ state.page='list'; renderContent(); window.scrollTo(0,0); }
function setTag(tag){ state.activeTag=tag; state.page='list'; renderContent(); }

function faviconImg(tool){
  if(tool.favicon){
    return `<img src="${tool.favicon}" onerror="this.parentElement.innerHTML='${tool.icon}'" alt="">`;
  }
  return tool.icon;
}

function renderDetail(id){
  const tool = tools.find(t=>t.id===id);
  if(!tool) return '';
  const full = LANG==='he'?tool.fullHe:tool.fullEn;
  const cat = LANG==='he'?CATS_HE[tool.cat]:CATS_EN[tool.cat];
  const subj = LANG==='he'?SUBJS_HE[tool.subj]:SUBJS_EN[tool.subj];
  const whyEdu = LANG==='he'?(tool.whyEduHe||''):(tool.whyEduEn||'');
  const tip = LANG==='he'?(tool.tipHe||''):(tool.tipEn||'');
  const related = tools.filter(r=>r.id!==tool.id&&(r.cat===tool.cat||r.subj===tool.subj)).slice(0,4);

  const techPills = [
    {label: LANG==='he'?'מחיר':'Price', val: tool.pricing==='free'?t('free'):tool.pricing==='partial'?t('partial'):t('paid')},
    {label: LANG==='he'?'קושי':'Level', val: diffLabel(tool.difficulty)},
    {label: LANG==='he'?'שפה':'Language', val: langLabel(tool.lang)},
    tool.mobile ? {label:'', val: LANG==='he'?'📱 מובייל':'📱 Mobile'} : null,
    tool.login ? {label:'', val: LANG==='he'?'🔑 הרשמה':'🔑 Login'} : null,
    tool.hasVideo ? {label:'', val: LANG==='he'?'🎬 יש סרטון':'🎬 Has video'} : null,
  ].filter(Boolean);

  return `
    <div class="detail-page">
      <div class="back-btn" onclick="goList()">${t('back')}</div>
      <div class="detail-card">
        <div class="detail-header">
          <div class="detail-icon" style="background:${iconBg(tool.iconBg)}">${faviconImg(tool)}</div>
          <div>
            <div class="detail-title">${tool.name}</div>
            <div class="detail-subtitle">${LANG==='he'?tool.shortHe:tool.shortEn}</div>
            <div class="detail-actions">
              <button class="btn-action primary" onclick="window.open('${tool.url}','_blank')">${t('open')}</button>
              ${tool.hasVideo&&tool.video?`<button class="btn-action" onclick="window.open('${tool.video}','_blank')">🎬 ${t('watch')}</button>`:''}
              ${tool.guide?`<button class="btn-action" onclick="window.open('${tool.guide}','_blank')">📖 ${LANG==='he'?'מדריך לכלי':'Tool guide'}</button>`:''}
            </div>
          </div>
        </div>

        <div class="detail-sec-title">${t('about')}</div>
        <div class="detail-desc">${full}</div>

        ${whyEdu?`
        <div class="edu-box">
          <div class="edu-box-header"><span>🎓</span><span class="edu-box-title">${LANG==='he'?'למה זה טוב לחינוך?':'Why is this good for education?'}</span></div>
          <div class="edu-box-text">${whyEdu}</div>
        </div>`:''}

        ${tip?`
        <div class="tip-box">
          <div class="tip-label">${LANG==='he'?'טיפ פדגוגי':'Pedagogical tip'}</div>
          <div class="tip-text">${tip}</div>
        </div>`:''}

        <div class="detail-sec-title">${t('tags')}</div>
        <div class="tags-wrap">
          <span class="tag t-cat">${cat}</span>
          <span class="tag t-subj">${subj}</span>
          ${pricingTag(tool.pricing)}
          <span class="tag t-he">${langLabel(tool.lang)}</span>
          ${(tool.tags||[]).map(tag=>`<span class="tag t-use" style="cursor:pointer" onclick="setTag('${tag.replace(/'/g,"\\'")}');goList()">${tag}</span>`).join('')}
        </div>

        <button class="tech-toggle" onclick="toggleTech(this)" type="button">
          <span class="tech-toggle-arrow">▶</span>
          <span>${LANG==='he'?'פרטים טכניים':'Technical details'}</span>
        </button>
        <div class="tech-bar" id="tech-bar-${tool.id}">
          ${techPills.map(p=>`<span class="tech-pill">${p.label?`<span class="pill-label">${p.label}</span> `:''}<span class="pill-val">${p.val}</span></span>`).join('')}
        </div>
      </div>
      ${related.length?`
      <div class="related-section">
        <div class="related-title">${t('related')}</div>
        <div class="related-grid">
          ${related.map(r=>`
            <div class="related-card" onclick="goDetail(${r.id})">
              <div class="related-favicon" style="background:${iconBg(r.iconBg)}">${faviconImg(r)}</div>
              <div>
                <div class="related-name">${r.name}</div>
                <div class="related-cat">${LANG==='he'?CATS_HE[r.cat]:CATS_EN[r.cat]}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`:''}
    </div>
  `;
}

function resetToDefaults(){
  if(!confirm(LANG==='he'?'למחוק את כל הכלים ולחזור לרשימה המקורית?':'Delete all tools and restore the original list?')) return;
  localStorage.removeItem(LS_KEY);
  tools = JSON.parse(JSON.stringify(DEFAULT_TOOLS));
  closeAdmin();
  renderAll();
}

function toggleTech(btn){
  const bar = btn.nextElementSibling;
  const arrow = btn.querySelector('.tech-toggle-arrow');
  const isOpen = bar.classList.contains('open');
  bar.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function toggleMobileMenu(){
  const overlay = document.getElementById('mobile-sidebar-overlay');
  const panel = document.getElementById('mobile-sidebar-content');
  panel.innerHTML = document.getElementById('sidebar').innerHTML;
  overlay.style.display = 'flex';
}
function closeMobileMenu(){
  document.getElementById('mobile-sidebar-overlay').style.display = 'none';
}
function checkMobile(){
  const isMobile = window.innerWidth <= 768;
  const menuBtn = document.getElementById('menu-btn');
  if(menuBtn) menuBtn.style.display = isMobile ? 'flex' : 'none';
}

// ─── NAVIGATION ───────────────────────────────────────────────
function goHome(){
  state.page='list'; state.searchQ=''; state.activeCat=-1;
  state.activeSubj=-1; state.activePricing='all'; state.activeTag='';
  renderAll(); window.scrollTo(0,0);
}

// ─── FONT SIZE ─────────────────────────────────────────────────
const LS_FONT = 'aitools_fontlevel';
let fontLevel = parseInt(localStorage.getItem(LS_FONT)||'0');
const FONT_SIZES = [13,14,15,16,17,18];
function applyFontSize(){
  const idx = Math.max(0,Math.min(FONT_SIZES.length-1, 2+fontLevel));
  document.documentElement.style.setProperty('--fs-base', FONT_SIZES[idx]+'px');
  document.documentElement.style.setProperty('--fs-sm', (FONT_SIZES[idx]-2)+'px');
  document.documentElement.style.setProperty('--fs-xs', (FONT_SIZES[idx]-4)+'px');
  document.documentElement.style.setProperty('--fs-card-name', (FONT_SIZES[idx]-1)+'px');
  document.documentElement.style.setProperty('--fs-card-short', (FONT_SIZES[idx]-3)+'px');
  const up = document.getElementById('font-up-btn');
  const dn = document.getElementById('font-down-btn');
  if(up) up.style.opacity = idx >= FONT_SIZES.length-1 ? '0.3' : '1';
  if(dn) dn.style.opacity = idx <= 0 ? '0.3' : '1';
}
function changeFontSize(dir){
  fontLevel = Math.max(-2, Math.min(3, fontLevel+dir));
  localStorage.setItem(LS_FONT, fontLevel);
  applyFontSize();
}

// ─── THEME ─────────────────────────────────────────────────────
const LS_THEME = 'aitools_theme';
const THEMES = ['auto','light','dark'];
const THEME_ICONS = {auto:'🌗', light:'☀️', dark:'🌙'};
let themeMode = localStorage.getItem(LS_THEME) || 'auto';
function applyTheme(){
  const btn = document.getElementById('theme-btn');
  let resolved = themeMode;
  if(themeMode === 'auto') resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', resolved);
  if(btn) btn.textContent = THEME_ICONS[themeMode];
}
function cycleTheme(){
  const idx = THEMES.indexOf(themeMode);
  themeMode = THEMES[(idx+1)%THEMES.length];
  localStorage.setItem(LS_THEME, themeMode);
  applyTheme();
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{ if(themeMode==='auto') applyTheme(); });

// ─── TAGS EXPAND ───────────────────────────────────────────────
let tagsExpanded = false;
function toggleTagsExpand(){
  tagsExpanded = !tagsExpanded;
  const row = document.getElementById('tags-chips-row');
  const btn = document.getElementById('tags-toggle-btn');
  if(row) row.classList.toggle('expanded', tagsExpanded);
  if(btn) btn.textContent = tagsExpanded
    ? (LANG==='he'?'סגור ▴':'Close ▴')
    : (LANG==='he'?'כל התגיות ▾':'All tags ▾');
}

// ─── INIT ─────────────────────────────────────────────────────
renderAll();
applyFontSize();
applyTheme();
checkMobile();
window.addEventListener('resize', checkMobile);
</script>
</body>
</html>
