<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר כלי AI לחינוך</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0efe9;
  --surface: #ffffff;
  --surface2: #f5f4f0;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #18181a;
  --text2: #5a5a58;
  --text3: #9a9a96;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --blue-text: #0C447C;
  --teal: #0F6E56; --teal-bg: #E1F5EE; --teal-text: #085041;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #633806;
  --coral: #993C1D; --coral-bg: #FAECE7; --coral-text: #4A1B0C;
  --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #26215C;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #173404;
  --pink: #993556; --pink-bg: #FBEAF0; --pink-text: #4B1528;
  --rad: 10px; --rad-lg: 14px; --rad-xl: 18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Assistant',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
body.ltr{font-family:'Inter',Arial,sans-serif;direction:ltr}
body.rtl{direction:rtl}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;user-select:none}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.app-name{font-size:15px;font-weight:600;color:var(--text)}
.app-name span{font-weight:300;color:var(--text2)}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btn{padding:5px 12px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.lang-btn.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);font-weight:500}

/* ── LAYOUT ── */
.main{display:flex;flex:1}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-inline-end:0.5px solid var(--border);padding:20px 12px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.content{flex:1;padding:24px;min-width:0;overflow-y:auto}

/* ── SIDEBAR ── */
.sidebar-section{margin-bottom:24px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--rad);cursor:pointer;transition:background .1s}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--blue-bg)}
.nav-item-label{font-size:13px;color:var(--text)}
.nav-item.active .nav-item-label{color:var(--blue-text);font-weight:500}
.nav-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 7px;border-radius:99px}
.nav-item.active .nav-count{background:rgba(24,95,165,.12);color:var(--blue-text)}

/* ── SEARCH ── */
.search-wrap{background:var(--surface);border-radius:var(--rad-lg);border:0.5px solid var(--border);padding:16px 20px;margin-bottom:16px}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;height:42px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue);background:white}
.search-btn{height:42px;padding:0 20px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
.chips-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:99px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.chip.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);font-weight:500}
.chip:hover{background:white}

/* ── CARDS ── */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-size:13px;color:var(--text2)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--surface);border-radius:var(--rad-lg);border:0.5px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--border2)}
.card.featured{border-color:var(--blue);border-width:1.5px}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-icon{width:40px;height:40px;border-radius:var(--rad);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.card-icon img{width:28px;height:28px;object-fit:contain}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.card-short{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.t-cat{background:var(--blue-bg);color:var(--blue-text)}
.t-subj{background:var(--green-bg);color:var(--green-text)}
.t-free{background:var(--teal-bg);color:var(--teal-text)}
.t-partial{background:var(--amber-bg);color:var(--amber-text)}
.t-paid{background:var(--coral-bg);color:var(--coral-text)}
.t-he{background:var(--purple-bg);color:var(--purple-text)}
.t-use{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2)}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:0.5px solid var(--border);margin-top:auto}
.meta-badge{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.video-dot{width:8px;height:8px;background:var(--pink);border-radius:99px;display:inline-block}
.card-btns{display:flex;gap:6px}
.btn-xs{font-size:12px;padding:4px 10px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:background .1s}
.btn-xs:hover{background:var(--surface2)}
.btn-xs.primary{background:var(--blue);color:white;border-color:var(--blue);font-weight:500}
.btn-xs.primary:hover{background:var(--blue-text)}
.featured-badge{font-size:10px;background:var(--blue-bg);color:var(--blue-text);padding:2px 8px;border-radius:99px;font-weight:600}
/* collapsible tech */
.tech-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 0;user-select:none;border:none;background:transparent;font-family:inherit;margin-bottom:4px}
.tech-toggle:hover{color:var(--text2)}
.tech-toggle-arrow{font-size:10px;transition:transform .2s;display:inline-block}
.tech-toggle-arrow.open{transform:rotate(90deg)}
.tech-bar{display:flex;flex-wrap:wrap;gap:6px;overflow:hidden;max-height:0;transition:max-height .25s ease,opacity .2s;opacity:0}
.tech-bar.open{max-height:200px;opacity:1}
.tech-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surface2);border:0.5px solid var(--border)}
.tech-pill .pill-label{color:var(--text3);font-size:11px}
.tech-pill .pill-val{font-weight:500;color:var(--text)}

/* ── DETAIL ── */
.detail-page{max-width:720px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:20px;padding:6px 0}
.back-btn:hover{color:var(--text)}
.detail-card{background:var(--surface);border-radius:var(--rad-xl);border:0.5px solid var(--border);padding:28px;margin-bottom:16px}
.detail-header{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
.detail-icon{width:52px;height:52px;border-radius:var(--rad-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:var(--surface2)}
.detail-icon img{width:100%;height:100%;object-fit:contain;padding:6px}
.detail-title{font-size:22px;font-weight:700;color:var(--text)}
.detail-subtitle{font-size:14px;color:var(--text2);margin-top:4px}
.detail-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-action{padding:8px 18px;border-radius:var(--rad);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border2);background:transparent;color:var(--text);transition:all .15s}
.btn-action.primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn-action.primary:hover{background:var(--blue-text)}
.btn-action:hover{background:var(--surface2)}
.detail-desc{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:20px}
.detail-sec-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.tech-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tech-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--surface2);border:0.5px solid var(--border)}
.tech-pill .pill-label{color:var(--text3);font-size:11px}
.tech-pill .pill-val{font-weight:500;color:var(--text)}
.edu-box{background:var(--blue-bg);border-radius:var(--rad-lg);padding:14px 16px;margin-bottom:10px}
.edu-box-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.edu-box-title{font-size:13px;font-weight:600;color:var(--blue-text)}
.edu-box-text{font-size:13px;color:var(--blue-text);line-height:1.65;opacity:.9}
.tip-box{background:var(--teal-bg);border-radius:var(--rad);padding:11px 14px;margin-bottom:20px;border-inline-start:3px solid var(--teal)}
body.rtl .tip-box{border-inline-start:none;border-inline-end:3px solid var(--teal)}
.tip-label{font-size:11px;font-weight:600;color:var(--teal);margin-bottom:3px}
.tip-text{font-size:13px;color:var(--teal-text);line-height:1.6}
.tags-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.related-section{background:var(--surface);border-radius:var(--rad-xl);border:0.5px solid var(--border);padding:20px}
.related-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.related-card{border:0.5px solid var(--border);border-radius:var(--rad);padding:10px 12px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:10px}
.related-card:hover{border-color:var(--blue)}
.related-favicon{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;font-size:14px}
.related-favicon img{width:100%;height:100%;object-fit:contain;padding:3px}
.related-name{font-size:12px;font-weight:600;color:var(--text)}
.related-cat{font-size:11px;color:var(--text3);margin-top:1px}

/* ── ADMIN PANEL ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.admin-modal{background:var(--surface);border-radius:var(--rad-xl);width:min(700px,95vw);max-height:90vh;overflow-y:auto;border:0.5px solid var(--border)}
.admin-header{padding:20px 24px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10}
.admin-header-title{font-size:16px;font-weight:600;color:var(--text)}
.admin-close{width:32px;height:32px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.admin-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);padding:0 24px}
.admin-tab{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);font-family:inherit;background:transparent;border-top:none;border-left:none;border-right:none;transition:all .15s}
.admin-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.admin-body{padding:24px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 12px;font-size:14px;font-family:inherit;outline:none}
.form-input{height:40px}
.form-select{height:40px;cursor:pointer}
.form-textarea{height:80px;padding:10px 12px;resize:vertical}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue);background:white}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-submit{width:100%;height:44px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.form-submit:hover{background:var(--blue-text)}
.form-submit:disabled{background:var(--text3);cursor:not-allowed}

/* AI fill */
.ai-fill-row{display:flex;gap:8px;margin-bottom:16px}
.ai-fill-input{flex:1;height:42px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 14px;font-size:14px;font-family:inherit;outline:none}
.ai-fill-input:focus{border-color:var(--blue);background:white}
.ai-fill-btn{height:42px;padding:0 16px;background:var(--purple);color:white;border:none;border-radius:var(--rad);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.ai-fill-btn:disabled{background:var(--text3);cursor:not-allowed}
.ai-status{font-size:12px;color:var(--text3);margin-bottom:12px;min-height:18px}
.ai-status.loading{color:var(--purple)}
.ai-status.done{color:var(--teal)}
.ai-status.error{color:var(--coral)}
.divider{height:0.5px;background:var(--border);margin:16px 0}

/* tools list in admin */
.tool-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--rad);border:0.5px solid var(--border);margin-bottom:8px;background:var(--surface2)}
.tool-row-icon{font-size:20px;flex-shrink:0}
.tool-row-info{flex:1;min-width:0}
.tool-row-name{font-size:13px;font-weight:600;color:var(--text)}
.tool-row-cat{font-size:11px;color:var(--text3)}
.tool-row-actions{display:flex;gap:6px;flex-shrink:0}
.btn-delete{padding:4px 10px;border-radius:var(--rad);border:0.5px solid rgba(153,60,29,.3);background:var(--coral-bg);color:var(--coral);font-size:12px;cursor:pointer;font-family:inherit}
.btn-feature{padding:4px 10px;border-radius:var(--rad);border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit}
.btn-feature.on{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue)}

/* api key */
.apikey-wrap{background:var(--surface2);border-radius:var(--rad);border:0.5px solid var(--border);padding:16px;margin-bottom:16px}
.apikey-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.apikey-row{display:flex;gap:8px}
.apikey-input{flex:1;height:38px;border-radius:var(--rad);border:0.5px solid var(--border2);background:white;color:var(--text);padding:0 12px;font-size:13px;font-family:'Inter',monospace;outline:none}
.apikey-input:focus{border-color:var(--blue)}
.apikey-save{height:38px;padding:0 14px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:13px;cursor:pointer;font-family:inherit}
.apikey-status{font-size:11px;color:var(--teal);margin-top:5px}
.notice{font-size:12px;color:var(--text3);line-height:1.5;background:var(--amber-bg);color:var(--amber-text);border-radius:var(--rad);padding:10px 12px;margin-bottom:14px}

/* password */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center}
.pw-box{background:var(--surface);border-radius:var(--rad-xl);padding:28px;width:300px;text-align:center}
.pw-title{font-size:15px;font-weight:600;margin-bottom:12px}
.pw-input{width:100%;height:40px;border-radius:var(--rad);border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);padding:0 12px;font-size:15px;letter-spacing:.2em;font-family:monospace;outline:none;text-align:center;margin-bottom:10px}
.pw-input:focus{border-color:var(--blue)}
.pw-btn{width:100%;height:40px;background:var(--blue);color:white;border:none;border-radius:var(--rad);font-size:14px;cursor:pointer;font-family:inherit}
.pw-err{font-size:12px;color:var(--coral);margin-top:6px}
.pw-cancel{font-size:12px;color:var(--text3);cursor:pointer;margin-top:8px;display:block}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:0.5px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:auto}
.footer-credit{font-size:12px;color:var(--text3)}
.footer-credit strong{color:var(--text2);font-weight:500}
.footer-copy{font-size:11px;color:var(--text3)}

/* ── RESPONSIVE — MOBILE ── */
@media (max-width: 768px) {
  .sidebar{display:none}
  .content{padding:14px}
  .topbar{padding:0 14px;height:52px}
  .app-name span{display:none}
  .app-name{font-size:14px}
  .lang-btn{padding:4px 9px;font-size:12px}

  .search-wrap{padding:12px 14px;border-radius:var(--rad)}
  .search-row{gap:6px}
  .search-input{height:38px;font-size:13px}
  .search-btn{height:38px;padding:0 14px;font-size:13px}
  .chips-row{gap:5px}
  .chip{font-size:11px;padding:3px 10px}

  .cards-grid{grid-template-columns:1fr;gap:10px}
  .card{padding:13px}
  .card-icon{width:36px;height:36px;font-size:18px}
  .card-icon img{width:24px;height:24px}
  .card-name{font-size:13px}
  .card-short{font-size:11px}
  .tag{font-size:10px;padding:2px 7px}
  .btn-xs{font-size:11px;padding:4px 9px}

  .detail-page{max-width:100%}
  .detail-card{padding:18px}
  .detail-header{gap:12px}
  .detail-icon{width:44px;height:44px;font-size:22px}
  .detail-title{font-size:18px}
  .detail-subtitle{font-size:13px}
  .btn-action{padding:7px 14px;font-size:12px}
  .detail-grid{grid-template-columns:1fr 1fr}
  .tech-bar{gap:5px}
  .tech-pill{font-size:11px;padding:3px 8px}
  .edu-box{padding:12px 14px}
  .tip-box{padding:10px 12px}
  .related-grid{grid-template-columns:1fr 1fr}

  .admin-modal{width:100vw;max-height:100vh;border-radius:var(--rad-lg) var(--rad-lg) 0 0;position:fixed;bottom:0;left:0;right:0}
  .form-2col,.form-3col{grid-template-columns:1fr}

  .footer{padding:12px 14px}
  .footer-copy{display:none}
}

/* empty */
.empty-state{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-title{font-size:16px;font-weight:500;margin-bottom:4px}
.empty-sub{font-size:13px}

@media (max-width: 420px) {
  .cards-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .related-grid{grid-template-columns:1fr}
  .detail-actions{flex-direction:column}
  .btn-action{width:100%;text-align:center}
}
.empty-title{font-size:16px;font-weight:500;margin-bottom:4px}
.empty-sub{font-size:13px}

/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body class="rtl">

<div id="app" style="display:flex;flex-direction:column;min-height:100vh">

<!-- TOPBAR -->

const DEFAULT_TOOLS = [
  {id:1,name:'PDF24 Tools',tags:['עבודה עם PDF','מיזוג מסמכים','פיצול PDF','הכנת חומר לתלמידים','המרת קבצים','OCR'],shortHe:'24 כלים חינמיים לעבודה עם PDF — מיזוג, פיצול, המרה, עריכה',shortEn:'24 free PDF tools — merge, split, convert, edit and compress',fullHe:'PDF24 הוא אוסף של 24 כלים מקוונים חינמיים לחלוטין לעבודה עם קבצי PDF. מיזוג קבצים, פיצול, דחיסה, עריכה, חתימה, המרת תמונות ל-PDF, הוספת סימני מים, מספרי עמודים, OCR ועוד. אינו דורש התקנה ועובד ישירות בדפדפן.',fullEn:'PDF24 offers 24 fully free online PDF tools — merge, split, compress, edit, sign, convert images, add watermarks, page numbers, OCR and more. No installation needed, works directly in the browser.',whyEduHe:'מורים מקבלים חומרים ממקורות שונים — קובץ מהמפקחת, דף מהספר, מסמך ממשרד החינוך. PDF24 מאפשר למזג, לחתוך ולהכין חבילת חומרים מסודרת לתלמידים בלי להתקין כלום ובלי לשלם.',whyEduEn:'Teachers receive materials from many sources. PDF24 lets you merge, crop, and package clean study materials for students — free, no installation needed.',tipHe:'גררו כמה קבצי PDF לכלי המיזוג, קבעו סדר ולחצו מיזוג — תוך 10 שניות יש חבילת חומר לימוד אחת מסודרת.',tipEn:'Drag multiple PDFs into the merge tool, set the order, click merge — in 10 seconds you have one clean study packet.',url:'https://tools.pdf24.org/he/',video:'',guide:'',icon:'📋',iconBg:'coral',favicon:'https://tools.pdf24.org/favicon.ico',cat:2,subj:0,pricing:'free',difficulty:'easy',lang:'multilang',mobile:true,login:false,hasVideo:false,featured:true},
  {id:2,name:'GuyAI',tags:['מערך שיעור','יצירת מבחנים','יצירת שאלות','הכנה לבגרות','שיעורי בית','צילום שאלה'],shortHe:'מורה פרטי AI ישראלי — פתרון תרגילים, מבחנים ואימון 24/7',shortEn:'Israeli AI private tutor — exercises, exams and practice 24/7',fullHe:'GuyAI הוא מורה פרטי AI שפותח בישראל לתלמידי תיכון ואקדמיה. כולל פתרון תרגילים בצילום, פתרון מבחנים מ-PDF, מחולל מבחנים, סיכומים, אבחון רמה ותוכנית לימוד אישית. ממשק עברי מלא, מותאם לתוכנית הלימודים הישראלית.',fullEn:'GuyAI is an Israeli AI private tutor for high school and university. Photo exercise solving, PDF exam solving, quiz generator, summaries, level diagnosis, and personalized study plans. Full Hebrew UI, aligned with the Israeli curriculum.',whyEduHe:'GuyAI בנוי סביב הצרכים של התלמיד הישראלי — תוכנית הלימודים, הבגרויות ושפת הממשק. מורים יכולים לבנות מבחנים, מערכי שיעור ולעקוב אחר תלמידים — הכל בעברית.',whyEduEn:'GuyAI is built around Israeli student needs — the curriculum, Bagrut exams, and Hebrew interface. Teachers can build tests, lesson plans, and track student progress — all in Hebrew.',tipHe:'השתמשו ב"סטודיו מערכי שיעור AI" בתפריט המורים — הזינו נושא ורמת כיתה וקבלו מערך שיעור מובנה תוך דקות.',tipEn:'Use the "AI Lesson Plan Studio" in the teachers menu — enter a topic and grade level and get a structured lesson plan in minutes.',url:'https://www.guyai.co.il/',video:'',guide:'',icon:'🧑‍🏫',iconBg:'blue',favicon:'https://www.guyai.co.il/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'he',mobile:true,login:true,hasVideo:false,featured:true},
  {id:3,name:'NotebookLM',tags:['סיכום מסמך','הכנת חומרים','שאלות על טקסט','פודקאסט מחומר לימוד','מחקר'],shortHe:'כלי AI של גוגל לניתוח מסמכים, סיכום ויצירת פודקאסט',shortEn:'Google AI tool to analyze documents, summarize and create podcasts',fullHe:'NotebookLM הוא כלי AI של גוגל שמאפשר להעלות מסמכים, מצגות, קישורים ווידאו, ולשאול עליהם שאלות. הכלי מייצר סיכומים, ציר זמן, מפת נושאים, ואפילו פודקאסט שיחה בין שני קריינים על תוכן המסמך.',fullEn:'NotebookLM by Google lets you upload documents, slides, links, and videos, then ask questions about them. It generates summaries, timelines, topic maps, and even an audio podcast conversation based on your content.',whyEduHe:'מורה שצריך לסכם יחידה שלמה, לייצר שאלות מחומר קיים, או ליצור פודקאסט מרתק לתלמידים — NotebookLM עושה את זה מהחומרים שכבר יש לו. אין צורך לבנות מחדש.',whyEduEn:'A teacher who needs to summarize a unit, create questions from existing material, or produce an engaging podcast for students — NotebookLM does it all from materials you already have.',tipHe:'העלו את כל חומרי היחידה (מצגת + מאמר + וידאו), לחצו "Generate Podcast" — תוך דקות יש שיחה מעניינת בין שני קריינים על הנושא, שאפשר לשלוח לתלמידים.',tipEn:'Upload all unit materials (slides + article + video), click "Generate Podcast" — in minutes you have an engaging two-host conversation on the topic to share with students.',url:'https://notebooklm.google/',video:'',guide:'https://letsai.co.il/aitools/notebooklm/',icon:'📓',iconBg:'green',favicon:'https://notebooklm.google/favicon.ico',cat:0,subj:0,pricing:'free',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:false,featured:true},
  {id:4,name:'Claude',tags:['מערך שיעור','הכנת חומרים','יצירת שאלות','משוב לתלמידים','עיבוד מסמכים','כתיבת טקסטים'],shortHe:'עוזר AI מתקדם לכתיבה, ניתוח ויצירת חומרי הוראה',shortEn:'Advanced AI assistant for writing, analysis and teaching materials',fullHe:'Claude הוא עוזר AI של Anthropic, מצטיין במשימות כתיבה ארוכה, עיבוד מסמכים גדולים, יצירת חומרי הוראה מורכבים ומתן הסברים מעמיקים. תומך בהעלאת קבצי PDF, Word ותמונות לניתוח.',fullEn:'Claude by Anthropic excels at long-form writing, processing large documents, creating complex teaching materials, and giving deep explanations. Supports uploading PDFs, Word files and images for analysis.',whyEduHe:'כשצריך לכתוב מערך שיעור מפורט, לסכם מאמר ארוך, לכתוב גרסאות מותאמות של אותו טקסט לרמות שונות, או לנסח משוב עדין לתלמיד — Claude נותן תוצאות איכותיות גם על משימות ארוכות ומורכבות.',whyEduEn:'When you need a detailed lesson plan, a long article summarized, the same text adapted for different levels, or carefully worded student feedback — Claude delivers quality results even on long, complex tasks.',tipHe:'העלו קובץ PDF של ספר לימוד ובקשו: "חלץ את הרעיונות המרכזיים מהפרק הזה וכתוב 3 שאלות לדיון כיתתי" — תוך רגע יש לכם חומר לשיעור.',tipEn:'Upload a textbook PDF and ask: "Extract the key ideas from this chapter and write 3 discussion questions" — instant lesson material.',url:'https://claude.ai/',video:'',guide:'',icon:'🤍',iconBg:'purple',favicon:'https://claude.ai/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:5,name:'MagicSchool AI',tags:['מערך שיעור','דפי עבודה','יצירת מבחנים','משוב לתלמידים','רובריקה','הבדלה'],shortHe:'80+ כלים AI מיועדים במיוחד למורים — ללא נסיון נדרש',shortEn:'80+ AI tools built specifically for teachers — no experience needed',fullHe:'MagicSchool AI הוא כלי ייחודי שבנוי ספציפית למורים, עם למעלה מ-80 כלים מובנים: יצירת מבחנים, מערכי שיעור, דפי עבודה, כתיבת משוב לתלמידים, הכנת IEP, תרגום ועוד — בלי לנסח פרומפטים.',fullEn:'MagicSchool AI is built specifically for teachers, with 80+ built-in tools: quizzes, lesson plans, worksheets, student feedback, IEPs, translation, and more — no prompt engineering needed.',whyEduHe:'מורים שלא רוצים להתעסק עם "איך לכתוב פרומפט" — MagicSchool עונה על הצורך. בוחרים כלי מהרשימה, ממלאים פרטים פשוטים, ומקבלים תוצר. חוסך שעות עבודה שבועיות.',whyEduEn:'Teachers who don\'t want to deal with "how to write prompts" — MagicSchool answers that need. Pick a tool, fill simple details, get a result. Saves hours of weekly work.',tipHe:'נסו את "Rubric Generator" — הכניסו מטלה ותקבלו רובריקת הערכה עם קריטריונים ברמות שונות, מוכנה להדפסה.',tipEn:'Try "Rubric Generator" — enter an assignment and get a print-ready rubric with criteria at different performance levels.',url:'https://www.magicschool.ai/',video:'https://www.youtube.com/watch?v=_3gpmBTAhgU',guide:'',icon:'🏫',iconBg:'green',favicon:'https://www.magicschool.ai/favicon.ico',cat:0,subj:0,pricing:'free',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:true},
  {id:6,name:'Perplexity',tags:['מחקר','חיפוש מידע','הכנת חומרים','מקורות מאומתים','שאלות עיון'],shortHe:'מנוע חיפוש AI עם מקורות מאומתים וסיכום מיידי',shortEn:'AI search engine with verified sources and instant summaries',fullHe:'Perplexity הוא מנוע חיפוש AI שמספק תשובות מסוכמות עם ציטוטים למקורות מאומתים. בניגוד ל-ChatGPT, הוא מחפש את האינטרנט בזמן אמת ומציין תמיד את המקור לכל מידע.',fullEn:'Perplexity is an AI search engine that gives summarized answers with citations to verified sources. Unlike ChatGPT, it searches the web in real time and always cites the source of every piece of information.',whyEduHe:'כשמכינים שיעור על נושא עכשווי — Perplexity מייצר סיכום מהיר עם קישורים למקורות שאפשר לצטט בפני תלמידים. מסייע גם לתלמידים ללמוד לחפש מידע אמין.',whyEduEn:'When preparing a lesson on a current topic — Perplexity generates a fast summary with links to citable sources. Also helps students learn to find reliable information.',tipHe:'הפנו תלמידים ל-Perplexity לעבודות חקר — כל תשובה מגיעה עם מקורות מאומתים שאפשר לבדוק, לעומת ChatGPT שלעיתים ממציא.',tipEn:'Send students to Perplexity for research projects — every answer comes with verified sources to check, unlike ChatGPT which sometimes fabricates.',url:'https://www.perplexity.ai/',video:'',guide:'',icon:'🔍',iconBg:'blue',favicon:'https://www.perplexity.ai/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:false,hasVideo:false,featured:false},
  {id:7,name:'ChatGPT',tags:['מערך שיעור','דפי עבודה','יצירת שאלות','משוב לתלמידים','הבדלה','כתיבת טקסטים'],shortHe:'עוזר AI רב-תכליתי ליצירת תוכן, שאלות ומערכי שיעור',shortEn:'Multipurpose AI assistant for content, questions and lesson plans',fullHe:'ChatGPT של OpenAI הוא עוזר AI רב-תכליתי שמאפשר ליצור טקסטים, שאלות, מערכי שיעור, דפי עבודה ועוד. תומך בהעלאת תמונות, קבצים ומסמכים לניתוח.',fullEn:'ChatGPT by OpenAI is a multipurpose AI assistant for creating texts, questions, lesson plans, worksheets and more. Supports uploading images, files and documents for analysis.',whyEduHe:'ChatGPT מאפשר למורה להפוך כל נושא לחומר הוראה תוך דקות. אפשר לכתוב שאלות ברמות שונות, ליצור מערך שיעור, לנסח הסברים פשוטים, ולהתאים טקסטים לרמות קריאה שונות.',whyEduEn:'ChatGPT lets teachers turn any topic into teaching material in minutes — questions at different levels, lesson plans, simplified explanations, and texts adapted to different reading levels.',tipHe:'בקשו: "כתוב 6 שאלות על [נושא]: 2 ידע, 2 הבנה, 2 יישום לפי טקסונומיית בלום" — מקבלים מבחן מאוזן תוך שניות.',tipEn:'Ask: "Write 6 questions on [topic]: 2 knowledge, 2 comprehension, 2 application per Bloom\'s taxonomy" — you get a balanced quiz in seconds.',url:'https://chatgpt.com/',video:'',guide:'',icon:'🤖',iconBg:'blue',favicon:'https://chatgpt.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:8,name:'Gemini',tags:['מערך שיעור','הכנת חומרים','יצירת תמונות','סיכום מסמך','Google Workspace'],shortHe:'AI של גוגל — כתיבה, תמונות ושילוב עם Google Workspace',shortEn:'Google AI — writing, images and Google Workspace integration',fullHe:'Gemini הוא עוזר ה-AI של גוגל שמשתלב ישירות ב-Google Docs, Slides ו-Sheets, ותומך גם ביצירת תמונות. מאפשר לסכם מסמכים, ליצור מצגות, לנתח נתונים ולכתוב תוכן, הכל בתוך הסביבה המוכרת של גוגל.',fullEn:'Gemini is Google\'s AI assistant that integrates directly with Google Docs, Slides, and Sheets, and supports image generation. Summarize documents, create presentations, analyze data, and write content — all inside Google\'s familiar environment.',whyEduHe:'מורים שכבר עובדים עם Google for Education לא צריכים לעבור כלי — Gemini נמצא בדיוק שם. בנוסף, Gemini Advanced מאפשר יצירת תמונות ישירות ב-Docs.',whyEduEn:'Teachers already using Google for Education don\'t need to switch tools — Gemini is right there. Gemini Advanced also lets you generate images directly inside Docs.',tipHe:'ב-Google Slides: לחצו "עזר ב-AI", הכניסו נושא ומספר שקופיות — תקבלו מצגת מלאה תוך 30 שניות.',tipEn:'In Google Slides: click "Help me visualize", enter topic and slide count — get a full presentation in 30 seconds.',url:'https://gemini.google.com/',video:'',guide:'',icon:'✨',iconBg:'amber',favicon:'https://gemini.google.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},
  {id:9,name:'Google AI Studio',tags:['בניית כלים','עיבוד מסמכים','הכנת חומרים','יצירת שאלות','API'],shortHe:'סביבת AI מתקדמת של גוגל לבניית כלים חינוכיים',shortEn:'Google\'s advanced AI environment for building educational tools',fullHe:'Google AI Studio מאפשר לעבוד ישירות עם מודל Gemini בצורה מתקדמת — יצירת פרומפטים מורכבים, עיבוד קבצים גדולים, הגדרת הוראות קבועות, ובניית כלים פשוטים לשימוש חוזר. ניגשים לו בלי צורך בתשלום.',fullEn:'Google AI Studio lets you work directly with Gemini in an advanced mode — complex prompts, large file processing, persistent instructions, and building simple reusable tools. Accessible without payment.',whyEduHe:'מורים שרוצים ליצור כלי AI מותאם אישית — למשל "תמיד עבוד בעברית וענה כמורה לביולוגיה" — AI Studio מאפשר להגדיר הוראות קבועות שנשמרות, מה שחוסך זמן בכל שיחה.',whyEduEn:'Teachers wanting a custom AI tool — e.g., "always work in Hebrew and respond as a biology teacher" — AI Studio lets you set persistent instructions that save time on every conversation.',tipHe:'הגדירו System Instruction: "אתה מורה לכימיה לכיתות ט-יב. תמיד ענה בעברית. תמיד הצג נוסחאות בצורה ברורה." — כל שיחה חדשה מתחילה עם הגדרות אלו.',tipEn:'Set a System Instruction: "You are a chemistry teacher for grades 9-12. Always answer in Hebrew. Always present formulas clearly." — every new conversation starts with these settings.',url:'https://aistudio.google.com/',video:'',guide:'',icon:'🔬',iconBg:'teal',favicon:'https://aistudio.google.com/favicon.ico',cat:9,subj:0,pricing:'free',difficulty:'medium',lang:'en',mobile:false,login:true,hasVideo:false,featured:false},
  {id:10,name:'Gemini Image Generation',tags:['יצירת תמונות','איורים','ויזואלים לשקופיות','תמונות לחומר לימוד','עיצוב'],shortHe:'יצירת תמונות AI איכותיות עם Imagen 3 של גוגל',shortEn:'High-quality AI image generation with Google\'s Imagen 3',fullHe:'Gemini Image Generation מאפשר ליצור תמונות איכותיות מתיאור טקסטואלי עם מודל Imagen 3 של גוגל. נגיש דרך Gemini Advanced, מיועד לאיורים, עיצוב ויזואלי ויצירת תמונות לחומרי לימוד.',fullEn:'Gemini Image Generation creates high-quality images from text descriptions using Google\'s Imagen 3 model. Accessible through Gemini Advanced, designed for illustrations, visual design, and creating images for learning materials.',whyEduHe:'במקום לחפש שעות אחר תמונה שמתאימה בדיוק לנושא, מתארים במילים מה רוצים ומקבלים איור מדויק. מתאים לדפי עבודה, מצגות ופוסטרים לכיתה.',whyEduEn:'Instead of searching for hours for exactly the right image, describe what you want in words and get a precise illustration. Great for worksheets, presentations, and classroom posters.',tipHe:'לאיור מדעי — כתבו: "תרשים פשוט ונקי של מחזור החנקן עם חיצים, ברקע לבן, סגנון ספר לימוד" — מקבלים איור ישיר לדף עבודה.',tipEn:'For a science illustration: "Simple clean diagram of the nitrogen cycle with arrows, white background, textbook style" — ready for a worksheet.',url:'https://gemini.google/overview/image-generation/',video:'',guide:'',icon:'🖼️',iconBg:'pink',favicon:'https://www.google.com/favicon.ico',cat:4,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:false,login:true,hasVideo:false,featured:false},
  {id:11,name:'Gamma',tags:['יצירת מצגות','הכנת חומרים','מצגת לשיעור','סיכום נושא','הכנה מהירה'],shortHe:'יצירת מצגות מקצועיות מלאות מתוך טקסט תוך שניות',shortEn:'Create full professional presentations from text in seconds',fullHe:'Gamma מייצרת מצגת מלאה תוך 30 שניות — מקלידים נושא ומספר שקופיות ומקבלים עיצוב, תוכן ותמונות. אפשר לערוך, לשנות עיצוב ולייצא ל-PDF או PowerPoint.',fullEn:'Gamma generates a full presentation in 30 seconds — type a topic and number of slides and get design, content, and images. Edit, change design, and export to PDF or PowerPoint.',whyEduHe:'כשצריך להכין מצגת לשיעור מחר בבוקר — Gamma היא הפתרון. אין צורך בניסיון עיצובי. בוחרים נושא, רמת כיתה, ותוך דקה יש מצגת שנראית מקצועית.',whyEduEn:'When you need to prepare a lesson presentation for tomorrow — Gamma is the answer. No design experience needed. Choose topic and grade level, and in a minute you have a professional-looking presentation.',tipHe:'ציינו בפרומפט: "מצגת על [נושא] ל-10 שקופיות, לכיתה ט\', ברמת פשטות גבוהה, כולל שאלות חשיבה" — מקבלים מצגת מותאמת גיל.',tipEn:'In the prompt: "Presentation on [topic] for 10 slides, 9th grade, high simplicity level, include thinking questions" — age-appropriate result.',url:'https://gamma.app/',video:'https://www.youtube.com/watch?v=7bF7IUVfBcU',guide:'',icon:'⚡',iconBg:'amber',favicon:'https://gamma.app/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:false},
  {id:12,name:'Canva',tags:['יצירת מצגות','דפי עבודה','עיצוב גרפי','עלון הורים','כרזה לכיתה','תבניות מוכנות'],shortHe:'עיצוב מצגות, דפי עבודה וחומרים ויזואליים עם AI',shortEn:'Design presentations, worksheets and visual materials with AI',fullHe:'Canva היא פלטפורמת עיצוב עם AI מובנה — יצירת מצגות, דפי עבודה, כרזות ועלוני הורים. Magic Write כותב תוכן לפי בקשה, Magic Design מייצר פריסה אוטומטית, ויש אלפי תבניות חינוכיות מוכנות.',fullEn:'Canva is a design platform with built-in AI — create presentations, worksheets, posters, and parent newsletters. Magic Write drafts content on request, Magic Design auto-generates layouts, and thousands of education templates are available.',whyEduHe:'גם מורים בלי ניסיון עיצובי מייצרים עם Canva חומרים מקצועיים. הרווח האמיתי הוא הזמן: בוחרים תבנית, מחליפים טקסט, ומשתמשים ב-Magic Write לניסוח — העלון מוכן לפני שהזמנקה נגמרת.',whyEduEn:'Even teachers without design experience create professional materials with Canva. The real gain is time: pick a template, swap text, use Magic Write — the handout is done before the break ends.',tipHe:'לפני יום הורים — תבנית "Parent Newsletter", החליפו כותרת, לחצו Magic Write ← "קצר ל-3 נקודות בשפה חיובית". מוכן תוך שתי דקות.',tipEn:'Before parent evening — "Parent Newsletter" template, swap headline, click Magic Write ← "Summarize into 3 positive bullet points". Done in two minutes.',url:'https://www.canva.com/',video:'',guide:'',icon:'🎨',iconBg:'teal',favicon:'https://www.canva.com/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:true},
  {id:13,name:'ivrit.ai — תמלול חינמי',tags:['תמלול','תמלול עברית','הכנת חומרים','נגישות','תיעוד שיעור'],shortHe:'תמלול חינמי לעברית מדוברת — ממשק פשוט ללא הרשמה',shortEn:'Free Hebrew speech transcription — simple interface, no sign-up',fullHe:'ivrit.ai מציעה כלי תמלול חינמי לעברית מדוברת, מבוסס על מודל Whisper המותאם לעברית. מעלים קובץ אודיו או וידאו ומקבלים תמליל טקסט תוך דקות. ממשק עברי פשוט, אינו דורש הרשמה.',fullEn:'ivrit.ai offers a free Hebrew speech transcription tool based on a Hebrew-adapted Whisper model. Upload an audio or video file and get a text transcript in minutes. Simple Hebrew interface, no sign-up required.',whyEduHe:'תמלול שיעור, הרצאה, או ראיון בעברית — ivrit.ai מייצרת טקסט שאפשר לערוך, לסכם ולשלוח לתלמידים. מיוחד לתוכן עברי שכלים אחרים לא מתמללים מספיק טוב.',whyEduEn:'Transcribing a lesson, lecture, or Hebrew interview — ivrit.ai generates text you can edit, summarize, and send to students. Especially useful for Hebrew content that other tools transcribe poorly.',tipHe:'הקליטו הסבר קולי של נושא, העלו ל-ivrit.ai — תוך דקות יש לכם טקסט שאפשר לתקן ולהפוך לדף הסבר מודפס לתלמידים.',tipEn:'Record an audio explanation of a topic, upload to ivrit.ai — in minutes you have text to edit and turn into a printed explanation sheet for students.',url:'https://www.ivrit.ai/he/174-2/',video:'',guide:'',icon:'🎙️',iconBg:'purple',favicon:'https://www.ivrit.ai/favicon.ico',cat:6,subj:0,pricing:'free',difficulty:'easy',lang:'he',mobile:false,login:false,hasVideo:false,featured:false},
  {id:14,name:'ElevenLabs',tags:['יצירת אודיו','הקראת טקסט','נגישות','קריינות','יצירת תוכן'],shortHe:'יצירת קריינות ואודיו מטקסט עם קולות AI ריאליסטיים',shortEn:'Create voiceovers and audio from text with realistic AI voices',fullHe:'ElevenLabs מייצרת קריינות AI איכותית וריאליסטית מטקסט כתוב. מאפשרת לבחור מאות קולות, לשכפל קול, ולייצא קבצי אודיו MP3 לשימוש בסרטונים, מצגות ותכנים חינוכיים.',fullEn:'ElevenLabs generates high-quality, realistic AI voiceovers from written text. Choose from hundreds of voices, clone voices, and export MP3 audio files for use in videos, presentations, and educational content.',whyEduHe:'מורים שמכינים סרטוני הסבר, פודקאסטים חינוכיים, או חומר נגיש לתלמידים עם לקות ראייה — ElevenLabs ממיר כל טקסט לקריינות מקצועית בלי לרכוש ציוד הקלטה.',whyEduEn:'Teachers creating explanation videos, educational podcasts, or accessible materials for visually impaired students — ElevenLabs converts any text to professional voiceover without recording equipment.',tipHe:'כתבו סיכום קצר של נושא, הדביקו ב-ElevenLabs, בחרו קול נעים — תוך דקה יש קובץ אודיו שאפשר להכניס ישירות למצגת.',tipEn:'Write a short topic summary, paste into ElevenLabs, choose a pleasant voice — in one minute you have an audio file to embed directly in a presentation.',url:'https://elevenlabs.io/',video:'',guide:'',icon:'🔊',iconBg:'teal',favicon:'https://elevenlabs.io/favicon.ico',cat:7,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},
  {id:15,name:'Suno',tags:['יצירת מוזיקה','יצירת אודיו','שירי לימוד','שירי ילדים','פעילות כיתתית'],shortHe:'יצירת שירים מקוריים מתוך טקסט — AI מוזיקלי',shortEn:'Create original songs from text — musical AI',fullHe:'Suno מייצר שירים מלאים — לחן, מקצב, ביצוע ומילים — מתוך תיאור טקסטואלי קצר. אפשר לציין ז\'אנר, מצב רוח, שפה וסגנון ולקבל שיר גמור תוך שניות.',fullEn:'Suno generates full songs — melody, rhythm, performance and lyrics — from a short text description. Specify genre, mood, language, and style to get a finished song in seconds.',whyEduHe:'יצירת שיר על נושא לימודי היא דרך נפלאה לחזרה. "כתוב שיר פופ על מחזור המים לכיתה ה\'" — תוך שניות יש שיר מלא שהתלמידים ישמחו לשיר וליזכור.',whyEduEn:'Creating a song about a learning topic is a great way to review. "Write a pop song about the water cycle for 5th grade" — in seconds you have a full song students will enjoy singing and remembering.',tipHe:'לפני יחידת לימוד — צרו שיר ז\'אנגל קצר על המונחים המרכזיים בנושא ושלחו לתלמידים ב-WhatsApp. המוח זוכר מוזיקה טוב יותר מרשימות.',tipEn:'Before a unit — create a short jingle about the key terms and share it with students on WhatsApp. The brain remembers music better than lists.',url:'https://suno.com/home',video:'',guide:'',icon:'🎵',iconBg:'pink',favicon:'https://suno.com/favicon.ico',cat:7,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:false,featured:false},
  {id:16,name:'Lovable',tags:['בניית אפליקציות','כלים דיגיטליים','פרויקט תלמידים','קידוד ללא קוד'],shortHe:'בניית אפליקציות ואתרים מלאים עם AI — ללא קוד',shortEn:'Build full apps and websites with AI — no coding required',fullHe:'Lovable מאפשרת לבנות אפליקציות ואתרים מלאים בשיחה רגילה עם AI. מתארים מה רוצים ומקבלים אפליקציה פונקציונלית עם עיצוב, מסד נתונים וממשק. מתאים למורים שרוצים לבנות כלים חינוכיים מותאמים.',fullEn:'Lovable lets you build full apps and websites through a regular AI conversation. Describe what you want and get a functional app with design, database, and interface. Perfect for teachers who want to build custom educational tools.',whyEduHe:'מורה שרוצה לבנות מחשבון ייחודי, מאגר שאלות אינטראקטיבי, או כלי מעקב לכיתה — Lovable מאפשרת זאת בלי לכתוב שורת קוד אחת. הכלי בנוי תוך שעה.',whyEduEn:'A teacher who wants to build a custom calculator, interactive question bank, or class tracker — Lovable makes it possible without writing a single line of code. The tool is built within an hour.',tipHe:'תארו לאפליקציה: "צור מחשבון ציונים לפי רובריקה עם 4 קריטריונים" — תקבלו כלי עובד שאפשר לשלוח מיד לתלמידים.',tipEn:'Describe to the app: "Create a grade calculator based on a rubric with 4 criteria" — you get a working tool to send immediately to students.',url:'https://lovable.dev/',video:'',guide:'',icon:'💜',iconBg:'purple',favicon:'https://lovable.dev/favicon.ico',cat:9,subj:0,pricing:'partial',difficulty:'medium',lang:'en',mobile:false,login:true,hasVideo:false,featured:false},
  {id:17,name:'Base44',tags:['בניית אפליקציות','כלים דיגיטליים','פרויקט תלמידים','ניהול כיתה'],shortHe:'בניית אפליקציות ישראלית — AI שמבין עברית ובונה כלים',shortEn:'Israeli app builder — AI that understands Hebrew and builds tools',fullHe:'Base44 היא פלטפורמה ישראלית לבניית אפליקציות עם AI. מתארים מה רוצים בעברית ומקבלים אפליקציה עובדת עם עיצוב, מסד נתונים וממשק. כולל תמיכה בתשתית Backend.',fullEn:'Base44 is an Israeli app-building platform with AI. Describe what you want in Hebrew and get a working app with design, database, and interface. Includes Backend infrastructure support.',whyEduHe:'כמו Lovable אבל בעברית — מורים ישראלים יכולים לבנות כלי מעקב, מאגר שאלות, לוח ניהול כיתה, או כל כלי חינוכי אחר ישירות בעברית.',whyEduEn:'Like Lovable but in Hebrew — Israeli teachers can build tracking tools, question banks, class management boards, or any educational tool directly in Hebrew.',tipHe:'בנו "מחשבון הצגת תוצאות מבחן כיתתי" — הזינו ציוני הכיתה וקבלו גרף פיזור + ממוצע + הצעות להתאמה. בונה תוך דקות.',tipEn:'Build a "class test results display calculator" — enter class grades and get a scatter graph + average + adaptation suggestions. Builds in minutes.',url:'https://base44.com/',video:'',guide:'',icon:'🔧',iconBg:'coral',favicon:'https://base44.com/favicon.ico',cat:9,subj:0,pricing:'partial',difficulty:'medium',lang:'he',mobile:false,login:true,hasVideo:false,featured:false},
  {id:18,name:'WebSim',tags:['בניית אפליקציות','ויזואליזציה','פעילות כיתתית','כלים דיגיטליים','סימולציות'],shortHe:'יצירת אתרים, כלים וסימולציות אינטראקטיביות מתיאור',shortEn:'Create websites, tools and interactive simulations from a description',fullHe:'WebSim יוצר אתרים ואפליקציות אינטראקטיביות מתיאור טקסטואלי קצר. אפשר לבקש משחק חינוכי, סימולציה, כלי חישוב או ויזואליזציה — ומקבלים דף HTML פועל שאפשר לשתף מיידית.',fullEn:'WebSim creates interactive websites and apps from a short text description. Request an educational game, simulation, calculator, or visualization — and get a working HTML page you can share instantly.',whyEduHe:'מורה שרוצה סימולציה ויזואלית לנושא (תנועת גלים, גרף פונקציה, מפת זמן היסטורית) — WebSim בונה אותה תוך דקות, בלי צורך בידע טכני.',whyEduEn:'A teacher wanting a visual simulation for a topic (wave motion, function graph, historical timeline map) — WebSim builds it in minutes, no technical knowledge needed.',tipHe:'בקשו: "צור סימולציה אינטראקטיבית של מטוטלת שמדגימה תנופה מחזורית עם שינוי אורך החוט" — מקבלים כלי ויזואלי מוכן לשיעור.',tipEn:'Ask: "Create an interactive pendulum simulation demonstrating periodic motion with adjustable string length" — get a visual tool ready for class.',url:'https://websim.com/',video:'',guide:'',icon:'🌐',iconBg:'blue',favicon:'https://websim.com/favicon.ico',cat:9,subj:0,pricing:'partial',difficulty:'medium',lang:'en',mobile:false,login:true,hasVideo:false,featured:false},
];
  {id:1,name:'ChatGPT',shortHe:'יצירת תוכן, מערכי שיעור ושאלות לכל מקצוע',shortEn:'Content creation, lesson plans and questions for any subject',fullHe:'ChatGPT הוא כלי בינה מלאכותית של OpenAI המאפשר ליצור טקסטים, מערכי שיעור, שאלות בחינה ומשימות. מורים רבים משתמשים בו ליצירת חומרים מותאמים לרמת הכיתה, סיכום נושאים, בניית פעילויות והתאמת טקסטים לתלמידים מתקשים.',fullEn:'ChatGPT by OpenAI helps teachers generate lesson plans, quizzes, worksheets, and differentiated content. Widely used for summarizing topics, adapting texts, and creating classroom activities.',whyEduHe:'ChatGPT מאפשר למורה להפוך כל נושא לחומר הוראה תוך דקות. אפשר לבקש ממנו לכתוב שאלות ברמות שונות, ליצור מערך שיעור מובנה, לנסח הסברים פשוטים לתלמידים מתקשים, ולהתאים טקסטים לרמות קריאה שונות.',whyEduEn:'ChatGPT lets teachers turn any topic into teaching material in minutes — write questions at different levels, build structured lesson plans, simplify explanations for struggling students, and adapt texts to different reading levels.',tipHe:'השתמשו בפקודה: "כתוב 5 שאלות על [נושא] ברמות חשיבה שונות לפי בלום" — תקבלו שאלות מוכנות לשימוש מיידי.',tipEn:'Try: "Write 5 questions on [topic] at different Bloom\'s taxonomy levels" — you\'ll get ready-to-use questions instantly.',url:'https://chatgpt.com',video:'https://www.youtube.com/watch?v=jdpFAg4ELAI',icon:'🤖',iconBg:'blue',favicon:'https://chatgpt.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:true,featured:true},
  {id:2,name:'Canva Magic Studio',shortHe:'עיצוב מצגות, דפי עבודה וחומרים ויזואליים עם AI',shortEn:'Design presentations, worksheets and visual materials with AI',fullHe:'Canva Magic Studio מוסיפה יכולות AI לפלטפורמת העיצוב הפופולרית. יצירת מצגות, דפי עבודה, פוסטרים ועלונים בקלות, כולל יצירת תמונות מתיאור טקסטואלי ועריכה אוטומטית.',fullEn:'Canva Magic Studio brings AI to the popular design platform. Create presentations, worksheets, and posters easily with AI image generation and auto-layout features.',whyEduHe:'Canva מאפשרת לכל מורה — גם ללא ניסיון בעיצוב — ליצור חומרים ויזואליים מרשימים. בכמה לחיצות אפשר לייצר דף עבודה, כרזה לכיתה, או מצגת מלאה עם עיצוב מקצועי.',whyEduEn:'Canva empowers every teacher — even without design experience — to create impressive visual materials. In just a few clicks you can produce worksheets, classroom posters, or fully designed presentations.',tipHe:'השתמשו בתבניות "Education" של Canva כנקודת פתיחה, ואז בקשו מ-Magic Write לכתוב את התוכן ישירות לתוך השקופיות.',tipEn:'Start from Canva\'s "Education" templates, then use Magic Write to generate content directly inside the slides.',url:'https://canva.com',video:'https://www.youtube.com/watch?v=_OmM3o7lcVs',icon:'🎨',iconBg:'teal',favicon:'https://canva.com/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:true,featured:true},
  {id:3,name:'Gemini for Workspace',shortHe:'עוזר AI ישירות בתוך Google Docs, Slides ו-Sheets',shortEn:'AI assistant built into Google Docs, Slides and Sheets',fullHe:'Gemini for Google Workspace מאפשר לעבוד עם AI בתוך הכלים המוכרים של גוגל. ניתן לסכם מסמכים, לכתוב טיוטות, ליצור שקופיות ולנתח נתונים ישירות מתוך Docs, Slides ו-Sheets.',fullEn:'Gemini for Google Workspace brings AI directly into Google Docs, Slides, and Sheets. Summarize documents, write drafts, generate slides, and analyze spreadsheet data.',whyEduHe:'מורים שכבר עובדים עם Google for Education לא צריכים לעבור כלי — Gemini נמצא בדיוק שם. אפשר לסכם מסמך ארוך, לכתוב טיוטת מכתב להורים, או לייצר שקופיות מתוך רשימת נושאים.',whyEduEn:'Teachers already using Google for Education don\'t need to switch tools — Gemini is right there. Summarize long documents, draft parent letters, or generate slides from a topic list.',tipHe:'ב-Google Slides: לחצו על "עזר ב-AI", הכניסו נושא השיעור ומספר השקופיות הרצוי — תקבלו מצגת בסיסית תוך 30 שניות.',tipEn:'In Google Slides: click "Help me visualize", enter your lesson topic and slide count — you\'ll have a basic presentation in 30 seconds.',url:'https://workspace.google.com/intl/he/',video:'https://www.youtube.com/watch?v=xNcSjCkAh48',icon:'✨',iconBg:'amber',favicon:'https://workspace.google.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:true,featured:true},
  {id:4,name:'MagicSchool AI',shortHe:'80+ כלים AI מיועדים במיוחד למורים',shortEn:'80+ AI tools designed specifically for teachers',fullHe:'MagicSchool AI הוא פלטפורמה מיועדת למורים עם למעלה מ-80 כלים: יצירת מבחנים, מערכי שיעור, דפי עבודה, כתיבת משוב לתלמידים, הכנת IEP, תרגום ועוד — הכל בממשק אחד פשוט.',fullEn:'MagicSchool AI is a teacher-focused platform with 80+ tools: creating tests, lesson plans, worksheets, student feedback, IEPs, translation, and more in one simple interface.',whyEduHe:'MagicSchool בנויה ספציפית סביב הצרכים של המורה — לא צריך לנסח פרומפטים, פשוט בוחרים כלי (מערך שיעור, משוב, מבחן) וממלאים פרטים. חוסך שעות עבודה שבועיות.',whyEduEn:'MagicSchool is built specifically around teacher needs — no prompt engineering required. Just pick a tool (lesson plan, feedback, quiz) and fill in details. Saves hours of weekly work.',tipHe:'נסו את כלי "Rubric Generator" — הכניסו את המטלה ותקבלו רובריקת הערכה מוכנה עם קריטריונים ברמות שונות.',tipEn:'Try the "Rubric Generator" tool — enter your assignment and get a ready-made rubric with criteria across performance levels.',url:'https://magicschool.ai',video:'https://www.youtube.com/watch?v=_3gpmBTAhgU',icon:'🏫',iconBg:'green',favicon:'https://magicschool.ai/favicon.ico',cat:0,subj:0,pricing:'free',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:true},
  {id:5,name:'Khanmigo',shortHe:'עוזר AI של Khan Academy ללמידה ולהוראת מתמטיקה',shortEn:'Khan Academy AI tutor for math and learning',fullHe:'Khanmigo הוא עוזר ה-AI של Khan Academy, מיוחד לתמיכה בלמידה של מתמטיקה, מדעים ועוד. הוא מנחה תלמידים לתשובות במקום לתת אותן ישירות.',fullEn:"Khanmigo is Khan Academy's AI tutor for math, science, and more. It guides students toward answers rather than giving them outright.",whyEduHe:'Khanmigo לא נותן לתלמיד את התשובה — הוא שואל שאלות מנחות. זה מוביל להבנה עמוקה יותר ומפחית תלות. מתאים מאוד לתלמידים שנתקעים בתרגילים ומבקשים עזרה.',whyEduEn:'Khanmigo never gives away the answer — it asks guiding questions instead. This builds deeper understanding and reduces dependency. Perfect for students who get stuck and need support.',tipHe:'הכניסו את הכלי כ"עוזר שיעורי בית" לתלמידים — הם יכולים לשאול שאלות בכל שעה ולקבל הדרכה צעד אחר צעד.',tipEn:'Introduce it as a "homework helper" for students — they can ask questions at any hour and get step-by-step guidance.',url:'https://khanmigo.ai',video:'https://www.youtube.com/watch?v=rnIgnS8Susg',icon:'📐',iconBg:'green',favicon:'https://khanmigo.ai/favicon.ico',cat:8,subj:1,pricing:'free',difficulty:'easy',lang:'en',mobile:true,login:true,hasVideo:true,featured:false},
  {id:6,name:'Gamma',shortHe:'יצירת מצגות ואתרים מלאים מתוך טקסט בשניות',shortEn:'Create full presentations and websites from text in seconds',fullHe:'Gamma מאפשרת ליצור מצגות מקצועיות תוך שניות — מזינים נושא ומקבלים מצגת מלאה עם תכנים, עיצוב ותמונות. מתאים מאוד להכנת שיעורים מהירים.',fullEn:'Gamma creates professional presentations in seconds. Enter a topic and get a fully designed presentation with content and images. Perfect for quick lesson preparation.',whyEduHe:'כשצריך להכין מצגת לשיעור במהירות — Gamma היא הפתרון. מקלידים נושא ומספר שקופיות, והיא מייצרת מצגת מעוצבת ומגובת תוכן. אפשר לערוך ולהתאים אחר כך.',whyEduEn:'When you need to prep a lesson presentation quickly — Gamma is the answer. Type a topic and slide count, and it generates a designed, content-filled presentation. Easy to edit and customize afterward.',tipHe:'ציינו בפרומפט את רמת הכיתה: "מצגת על מהפכת התעשייה ל-10 שקופיות, לכיתה ט׳" — התוצאה תהיה מותאמת גיל.',tipEn:'Specify grade level in the prompt: "10-slide presentation on the Industrial Revolution for 9th grade" — the result will be age-appropriate.',url:'https://gamma.app',video:'https://www.youtube.com/watch?v=7bF7IUVfBcU',icon:'⚡',iconBg:'amber',favicon:'https://gamma.app/favicon.ico',cat:3,subj:0,pricing:'partial',difficulty:'easy',lang:'en',mobile:false,login:true,hasVideo:true,featured:false},
  {id:7,name:'Adobe Acrobat AI',shortHe:'שאל שאלות ותקבל סיכומים ממסמכי PDF',shortEn:'Ask questions and get summaries from PDF documents',fullHe:'Adobe Acrobat AI Assistant מאפשר לדבר עם כל מסמך PDF — לשאול שאלות, לקבל סיכום, לחפש מידע ספציפי ולהוציא ציטוטים. כלי מצוין לעבודה עם מאמרים, ספרי לימוד ומקורות היסטוריים.',fullEn:'Adobe Acrobat AI Assistant lets you chat with any PDF — ask questions, get summaries, search for specific information, and extract quotes.',whyEduHe:'מורים שעובדים עם מאמרים, ספרי לימוד ארוכים, או מסמכי מדיניות יכולים לחסוך זמן רב — פשוט שואלים "מה הטענה המרכזית?" או "תסכם את הפרק השלישי".',whyEduEn:'Teachers working with long articles, textbooks, or policy documents can save significant time — just ask "What\'s the main argument?" or "Summarize chapter three".',tipHe:'העלו מקורות היסטוריים כ-PDF ובקשו: "הכן 5 שאלות הבנה על המסמך הזה" — מיידי ומדויק.',tipEn:'Upload historical sources as PDFs and ask: "Create 5 comprehension questions about this document" — instant and accurate.',url:'https://acrobat.adobe.com',video:'',icon:'📄',iconBg:'coral',favicon:'https://acrobat.adobe.com/favicon.ico',cat:2,subj:0,pricing:'paid',difficulty:'easy',lang:'multilang',mobile:false,login:true,hasVideo:false,featured:false},
  {id:8,name:'Quizlet AI',shortHe:'יצירה אוטומטית של כרטיסיות, מבחנים ופעילויות חזרה',shortEn:'Auto-generate flashcards, quizzes and review activities',fullHe:'Quizlet משלבת AI ליצירה אוטומטית של כרטיסיות, שאלות ומשחקי חזרה. מורים מעלים טקסט ומקבלים ערכת לימוד שלמה.',fullEn:'Quizlet uses AI to auto-generate flashcards, quiz questions, and review games from any uploaded text.',whyEduHe:'אחרי הוראת נושא חדש — אפשר להדביק את הטקסט מהמחברת ל-Quizlet ולקבל ערכת חזרה שלמה לתלמידים תוך דקה. התלמידים יכולים לגשת אליה מהנייד ולתרגל לפני מבחן.',whyEduEn:'After teaching a new topic, paste the text into Quizlet and get a complete review set for students in one minute. Students can access it on mobile and practice before tests.',tipHe:'שלחו לתלמידים קישור ל-"Test mode" — הם מתאמנים על החומר בפורמט מבחן בלי לדעת מראש את התשובות.',tipEn:'Share a link to "Test mode" with students — they practice the material in a test format without seeing answers in advance.',url:'https://quizlet.com',video:'https://www.youtube.com/watch?v=6RJHfLJiulA',icon:'🃏',iconBg:'purple',favicon:'https://quizlet.com/favicon.ico',cat:5,subj:0,pricing:'partial',difficulty:'easy',lang:'en',mobile:true,login:true,hasVideo:true,featured:false},
  {id:9,name:'Speechify',shortHe:'הקראת טקסטים ומסמכים בקולות AI טבעיים',shortEn:'Text-to-speech reading of documents with natural AI voices',fullHe:'Speechify הופכת כל טקסט, PDF או מאמר להקראה קולית. מתאים מאוד לתלמידים עם דיסלקציה, לקויות קריאה, או לכל מי שמעדיף ללמוד בשמיעה.',fullEn:'Speechify converts any text, PDF, or article into audio. Great for students with dyslexia, reading difficulties, or audio learners.',whyEduHe:'לתלמידים עם דיסלקציה או קשיי קריאה — Speechify הוא כלי הנגשה חיוני. הם יכולים להאזין לחומרי לימוד תוך כדי תנועה, ולשלוט בקצב ההקראה.',whyEduEn:'For students with dyslexia or reading difficulties, Speechify is an essential accessibility tool. They can listen to learning materials on the go and control the reading speed.',tipHe:'הורידו את אפליקציית Speechify לנייד והראו לתלמידים כיצד להוסיף חומרים — אחר כך הם יכולים להאזין בדרך הביתה.',tipEn:'Download the Speechify mobile app and show students how to add materials — they can then listen on the way home.',url:'https://speechify.com',video:'https://www.youtube.com/watch?v=9eNRkEIDovw',icon:'🔊',iconBg:'teal',favicon:'https://speechify.com/favicon.ico',cat:7,subj:11,pricing:'partial',difficulty:'easy',lang:'multilang',mobile:true,login:true,hasVideo:true,featured:false},
  {id:10,name:'Otter.ai',shortHe:'תמלול שיעורים, הרצאות וישיבות באנגלית',shortEn:'Transcribe lessons, lectures and meetings in English',fullHe:'Otter.ai הוא כלי תמלול אוטומטי באנגלית המאפשר להפוך שיעורים, הרצאות וישיבות לטקסט. מתאים למורים שרוצים לתעד שיעורים ולתלמידים עם קשיי שמיעה.',fullEn:'Otter.ai automatically transcribes English audio into text — perfect for documenting lessons, recording lectures, and helping hearing-impaired students.',whyEduHe:'הפעילו את Otter בשיעור ותקבלו תמליל מלא שאפשר לשלוח לתלמידים שנעדרו, לתלמידים עם לקויות שמיעה, או להשתמש בו כחומר חזרה.',whyEduEn:'Run Otter during a lesson and get a full transcript to send to absent students, hearing-impaired students, or use as review material.',tipHe:'חברו את Otter לפגישות Zoom — הוא מתמלל אוטומטית ומייצר סיכום בנקודות בסוף הפגישה.',tipEn:'Connect Otter to Zoom meetings — it transcribes automatically and generates a bullet-point summary at the end of each meeting.',url:'https://otter.ai',video:'https://www.youtube.com/watch?v=9rQjjOXIHT0',icon:'🎙️',iconBg:'pink',favicon:'https://otter.ai/favicon.ico',cat:6,subj:3,pricing:'partial',difficulty:'easy',lang:'en',mobile:true,login:true,hasVideo:true,featured:false},
  {id:11,name:'Curipod',shortHe:'בניית שיעורים אינטראקטיביים עם AI',shortEn:'Build interactive lessons with AI',fullHe:'Curipod מאפשרת לבנות שיעורים אינטראקטיביים הכוללים שאלות, סקרים, ענן מילים ושאלות פתוחות — הכל נוצר אוטומטית על ידי AI.',fullEn:'Curipod builds interactive lessons with polls, word clouds, and open questions — all automatically generated by AI for hybrid and frontal teaching.',whyEduHe:'Curipod הופך שיעור פרונטלי לחוויה אינטראקטיבית — התלמידים מצביעים, כותבים, ומגיבים מהנייד. ה-AI בונה את כל פעילויות השיעור מנושא אחד בלבד.',whyEduEn:'Curipod turns a frontal lesson into an interactive experience — students vote, write, and respond from their phones. The AI builds all lesson activities from just one topic.',tipHe:'השתמשו בכלי "Word cloud" בתחילת שיעור — שאלו "מה אתם יודעים על...?" וצפו בענן המילים שגדל על המסך בזמן אמת.',tipEn:'Use the "Word cloud" activity at the start of a lesson — ask "What do you know about...?" and watch the cloud grow on screen in real time.',url:'https://curipod.com',video:'https://www.youtube.com/watch?v=a9EUuZUH8-c',icon:'🎯',iconBg:'blue',favicon:'https://curipod.com/favicon.ico',cat:0,subj:0,pricing:'partial',difficulty:'easy',lang:'en',mobile:true,login:true,hasVideo:true,featured:false},
  {id:12,name:'DALL-E 3',shortHe:'יצירת תמונות מותאמות לפי תיאור טקסטואלי',shortEn:'Generate custom images from text descriptions',fullHe:'DALL-E 3 של OpenAI מאפשר ליצור תמונות בהתאמה אישית לפי תיאור טקסטואלי. מורים יכולים ליצור איורים לחומרי לימוד, רקעים לשקופיות ועוד.',fullEn:'DALL-E 3 by OpenAI generates custom images from text descriptions — create illustrations for learning materials, slide backgrounds, and worksheets.',whyEduHe:'חומרי לימוד עם איורים רלוונטיים נזכרים טוב יותר. DALL-E מאפשר ליצור תמונות מדויקות לנושא — ציורים מדעיים, איורים היסטוריים, דיאגרמות — בלי תשלום על מאגרי תמונות.',whyEduEn:'Learning materials with relevant illustrations are better remembered. DALL-E lets you create precise topic images — scientific diagrams, historical illustrations — without paying for stock photos.',tipHe:'ציינו בתיאור את הסגנון: "איור מדעי פשוט ונקי על מחזור המים, ברקע לבן, מתאים לדף עבודה לכיתה ד\'."',tipEn:'Specify style in the description: "Simple clean scientific illustration of the water cycle, white background, suitable for a 4th grade worksheet."',url:'https://openai.com/dall-e-3',video:'',icon:'🖼️',iconBg:'pink',favicon:'https://openai.com/favicon.ico',cat:4,subj:0,pricing:'partial',difficulty:'medium',lang:'multilang',mobile:false,login:true,hasVideo:false,featured:false},

function switchTab(tab){
  adminTab = tab;
  ['add','manage','settings'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='add') renderAddTab();
  else if(tab==='manage') renderManageTab();
  else renderSettingsTab();
}

}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key': apiKey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const data = await resp.json();
    if(data.error){ setAiStatus('error', t('aiErr')+': '+data.error.message); btn.disabled=false; return; }
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const json = JSON.parse(text);
    // fill form
    setVal('f-name', json.name || toolName);
    setVal('f-tags', (json.tags||[]).join(', '));
    setVal('f-short-he', json.shortHe || '');
    setVal('f-short-en', json.shortEn || '');
    setVal('f-full-he', json.fullHe || '');
    setVal('f-full-en', json.fullEn || '');
    setVal('f-why-he', json.whyEduHe || '');
    setVal('f-why-en', json.whyEduEn || '');
    setVal('f-tip-he', json.tipHe || '');
    setVal('f-tip-en', json.tipEn || '');
    setVal('f-url', json.url || '');
    setVal('f-video', json.videoUrl || '');
    setVal('f-guide', json.guideUrl || '');
    setVal('f-icon', json.icon || '🔧');
    setSelectByValue('f-cat', String(json.catIndex || 0));
    setSelectByValue('f-subj', String(json.subjIndex || 0));
    setSelectByValue('f-pricing', json.pricing || 'partial');
    setSelectByValue('f-diff', json.difficulty || 'easy');
    setSelectByValue('f-lang', json.lang || 'multilang');
    setAiStatus('done', t('aiDone') + ' ✓');
  } catch(e) {
    setAiStatus('error', t('aiErr'));
  }
  btn.disabled = false;
}

function setVal(id, val){ const el=document.getElementById(id); if(el) el.value=val; }
function setSelectByValue(id, val){ const el=document.getElementById(id); if(el){ for(let o of el.options) if(o.value===val){ el.value=val; break; } } }
function setAiStatus(type, msg){ const el=document.getElementById('ai-status'); if(el){ el.className='ai-status '+type; el.textContent=msg; } }

// ─── SUBMIT TOOL ─────────────────────────────────────────────
function submitTool(){
  const name = document.getElementById('f-name').value.trim();
  if(!name) return;
  const catIdx = parseInt(document.getElementById('f-cat').value) || 0;
  const newTool = {
    id: Date.now(),
    tags: (document.getElementById('f-tags').value||'').split(',').map(s=>s.trim()).filter(Boolean),
    shortEn: document.getElementById('f-short-en').value,
    fullHe: document.getElementById('f-full-he').value,
    fullEn: document.getElementById('f-full-en').value,
    whyEduHe: document.getElementById('f-why-he').value,
    whyEduEn: document.getElementById('f-why-en').value,
    tipHe: document.getElementById('f-tip-he').value,
    tipEn: document.getElementById('f-tip-en').value,
    url: document.getElementById('f-url').value,
    video: document.getElementById('f-video').value,
    guide: document.getElementById('f-guide').value,
    icon: document.getElementById('f-icon').value || '🔧',
    iconBg: ICON_COLORS[catIdx % ICON_COLORS.length],
    favicon: '',
    cat: catIdx,
    subj: parseInt(document.getElementById('f-subj').value) || 0,
    pricing: document.getElementById('f-pricing').value,
    difficulty: document.getElementById('f-diff').value,
    lang: document.getElementById('f-lang').value,
    mobile: false, login: false,
    hasVideo: !!document.getElementById('f-video').value,
    featured: false
  };
  tools.push(newTool);
  saveTools();
  const succ = document.getElementById('f-success');
  succ.style.display = 'block';
  setTimeout(()=>{ succ.style.display='none'; renderAddTab(); }, 2000);
  renderSidebar();
}

// ─── MANAGE TAB ───────────────────────────────────────────────
function renderManageTab(){
  if(!tools.length){ document.getElementById('admin-body').innerHTML=`<div class="empty-state"><div class="empty-title">${t('noTools')}</div></div>`; return; }
  const rows = tools.map(tool=>`
    <div class="tool-row">
      <div class="tool-row-icon">${tool.icon}</div>
      <div class="tool-row-info">
        <div class="tool-row-name">${tool.name}</div>
        <div class="tool-row-cat">${LANG==='he'?CATS_HE[tool.cat]:CATS_EN[tool.cat]}</div>
      </div>
      <div class="tool-row-actions">
        <button class="btn-feature${tool.featured?' on':''}" onclick="toggleFeatured(${tool.id})">${tool.featured?'★ '+t('featured'):'☆ '+t('featured')}</button>
        <button class="btn-delete" onclick="deleteTool(${tool.id})">${LANG==='he'?'מחק':'Delete'}</button>
      </div>
    </div>
  `).join('');
  document.getElementById('admin-body').innerHTML = `<div>${rows}</div>`;
}

function toggleFeatured(id){
  const tool = tools.find(t=>t.id===id);
  if(tool){ tool.featured=!tool.featured; saveTools(); renderManageTab(); renderAll(); }
}

function deleteTool(id){
  const msg = LANG==='he'?'למחוק את הכלי?':'Delete this tool?';
  if(!confirm(msg)) return;
  tools = tools.filter(t=>t.id!==id);
  saveTools();
  renderManageTab();
  renderAll();
}

// ─── SETTINGS TAB ─────────────────────────────────────────────
function renderSettingsTab(){
  document.getElementById('admin-body').innerHTML = `
    <div class="apikey-wrap">
      <div class="apikey-label">${t('apiKeyLabel')}</div>
      <div class="apikey-row">
        <input class="apikey-input" id="apikey-input" type="password" value="${getApiKey()}" placeholder="sk-ant-...">
        <button class="apikey-save" onclick="saveApiKeyFromInput()">${t('apiKeySave')}</button>
      </div>
      <div class="apikey-status" id="apikey-status"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px">${t('apiKeyNotice')}</div>
    </div>
    <div style="background:var(--surface2);border-radius:var(--rad);border:0.5px solid var(--border);padding:16px;margin-top:12px">
      <div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">${LANG==='he'?'איפוס מאגר הכלים':'Reset tool library'}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${LANG==='he'?'מוחק את כל השינויים ומחזיר לרשימת הכלים המובנית.':'Deletes all changes and restores the built-in tool list.'}</div>
      <button class="form-submit" style="background:var(--coral);height:38px;margin-top:0" onclick="resetToDefaults()">${LANG==='he'?'איפוס לברירת מחדל ⚠️':'Reset to defaults ⚠️'}</button>
    </div>
      <div class="form-2col">
        <div><label class="form-label">${t('pwCurrent')}</label><input class="form-input" id="pw-current" type="password"></div>
        <div><label class="form-label">${t('pwNew')}</label><input class="form-input" id="pw-new" type="password"></div>
      </div>
      <button class="form-submit" style="margin-top:8px" onclick="changePassword()">${t('pwSave')}</button>
      <div id="pw-change-msg" style="display:none;text-align:center;font-size:12px;margin-top:8px;color:var(--teal)"></div>
